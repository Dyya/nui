  html, body { width: 100%; height: 100%; overflow: hidden; background: #FAFAFA; touch-action: none; -webkit-tap-highlight-color: transparent; }
  canvas { display: block; }
  /* Theme toggle: base light/dark (nav-driven when embedded). B still cycles bg as an override. */
  #toggle { position: fixed; bottom: 14px; right: 16px; z-index: 9998; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); background: rgba(255,255,255,.5); border: 1px solid rgba(0,0,0,.06); display: grid; place-items: center; transition: transform .2s cubic-bezier(.5,.02,.15,1); }
  body.dark #toggle { background: rgba(10,10,10,.35); border-color: rgba(255,255,255,.08); }
  #toggle::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #0A0A0A; }
  body.dark #toggle::after { background: #FAFAFA; }
  #toggle:hover { transform: scale(1.08); }

<body>
<canvas id="c">Extrude, extruded dimensional type. Requires JavaScript and an HTML5 canvas.</canvas>
<div id="toggle" title="Toggle theme"></div>
<script src="./core/ui.js"></script>
<script>
/**
 * TYPOGRAPHIC EXTRUDE
 *
 * Stacks N copies of a glyph with progressive variable font weight
 * and spatial offset to create dimensional depth.
 *
 * Modes: LINEAR · CURVE · SPIRAL
 *
 * Perf: pre-renders each weight bucket to an offscreen canvas,
 * pre-computes all layer transforms into a flat array on state
 * change, composites from the array each frame. Renders only
 * when dirty. setTransform over save/restore. DOM updates only
 * when display strings actually change.
 */

// ─── CONSTANTS ────────────────────────────────────────────────

const SANS = 'DM Sans';

const BACKGROUNDS = [
  { name: 'Black',      color: '#0A0A0A',  light: false },
  { name: 'Near Black', color: '#111111',  light: false },
  { name: 'Charcoal',   color: '#1A1A1A',  light: false },
  { name: 'Navy',       color: '#0E1525',  light: false },
  { name: 'White',      color: '#FAFAFA',  light: true  },
  { name: 'Cream',      color: '#F0EBE1',  light: true  },
  { name: 'Light Gray', color: '#E8E8E8',  light: true  },
];

// Theme base indices - the nav switch (when embedded) resets bg to one of these.
const BG_LIGHT_IDX = Math.max(0, BACKGROUNDS.findIndex(b => b.light));   // White
const BG_DARK_IDX  = Math.max(0, BACKGROUNDS.findIndex(b => !b.light));  // Black

const COLOR_SCHEMES = [
  { name: 'Grayscale',  fn: (t, li) => li ? lerpColor(0x00,0x00,0x00, 0xAA,0xAA,0xAA, t) : lerpColor(0xFF,0xFF,0xFF, 0x33,0x33,0x33, t) },
  { name: 'Warm Gray',  fn: (t, li) => li ? lerpColor(0x1A,0x10,0x08, 0xB0,0xA8,0x98, t) : lerpColor(0xF5,0xF0,0xE8, 0x3A,0x30,0x28, t) },
  { name: 'Orange',     fn: (t, li) => li ? lerpColor(0x8B,0x3A,0x1A, 0xE8,0xB8,0x9A, t) : lerpColor(0xE8,0x64,0x2D, 0x2A,0x10,0x08, t) },
  { name: 'Blue',       fn: (t, li) => li ? lerpColor(0x1A,0x27,0x44, 0x8A,0x9F,0xCC, t) : lerpColor(0x5A,0x78,0xFF, 0x0A,0x10,0x20, t) },
  { name: 'Green',      fn: (t, li) => li ? lerpColor(0x1A,0x3A,0x22, 0x7A,0xB8,0x8A, t) : lerpColor(0x3E,0xCF,0x8E, 0x0A,0x1A,0x10, t) },
  { name: 'Mono Fade',  fn: (t, li) => li ? `rgba(0,0,0,${(1 - t * 0.85).toFixed(3)})` : `rgba(255,255,255,${(1 - t * 0.85).toFixed(3)})` },
  { name: 'Hot',        fn: (t) => lerpColor(0xFF,0xFF,0xFF, 0xFF,0x22,0x00, t) },
  { name: 'Cool',       fn: (t) => lerpColor(0xFF,0xFF,0xFF, 0x00,0x44,0xFF, t) },
];

const MODES = ['LINEAR', 'CURVE', 'SPIRAL'];

const DEFAULTS = {
  layers: 28,
  extrudeAngle: Math.PI * 0.75,
  extrudeDepth: 180,
  curvature: 0.6,
  spiralTurns: 0.35,
  spiralSpread: 0.5,
  spiralShrink: 0.2,
  weightFrom: 900,
  weightTo: 100,
};

// ─── STATE ────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
let W, H, dpr;

const state = {
  text: 'a',
  mode: 0,
  bgIndex: BG_LIGHT_IDX,
  colorIndex: 0,
  fontSize: 0,
  dragging: false,
  ...DEFAULTS,
};

// Pre-computed render data - rebuilt on state change
let glyphCache = new Map();   // weight → { canvas, w, h, sw, sh }
let layerData = [];           // [{cached, x, y, scale, rotation}, …] back-to-front
let dirty = true;             // need full recache + recompute
let needsRecompute = true;    // need transform recompute only
let needsRepaint = true;      // need canvas redraw

// Body-background sync - only swap when light/dark actually flips
let prevLightClass = null;

// ─── UTILITIES ────────────────────────────────────────────────

function lerpColor(ar, ag, ab, br, bg_, bb, t) {
  const r = (ar + (br - ar) * t + 0.5) | 0;
  const g = (ag + (bg_ - ag) * t + 0.5) | 0;
  const b = (ab + (bb - ab) * t + 0.5) | 0;
  return `rgb(${r},${g},${b})`;
}

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }

function quantizeWeight(w) {
  return ((clamp(w, 100, 1000) / 50 + 0.5) | 0) * 50;
}

// ─── RESIZE ───────────────────────────────────────────────────

let resizeTimer = 0;
function onResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(doResize, 60);
}
function doResize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  state.fontSize = Math.min(W, H) * 0.65;
  markDirty();
}

// ─── DIRTY FLAGS ──────────────────────────────────────────────

function markDirty() { dirty = true; needsRecompute = true; needsRepaint = true; }
function markRecompute() { needsRecompute = true; needsRepaint = true; }

// ─── GLYPH CACHE ──────────────────────────────────────────────
// One offscreen canvas per quantized weight bucket.
// Stores the canvas plus pre-measured source/destination dimensions.

function buildGlyphCache() {
  glyphCache.clear();
  const size = state.fontSize;
  const bg = BACKGROUNDS[state.bgIndex];
  const scheme = COLOR_SCHEMES[state.colorIndex];
  const invRange = 1 / (Math.abs(state.weightFrom - state.weightTo) || 1);
  const wMin = Math.min(state.weightFrom, state.weightTo);
  const descending = state.weightFrom > state.weightTo;

  // Collect unique weight buckets
  const weights = new Set();
  for (let i = 0; i < state.layers; i++) {
    const t = state.layers === 1 ? 0 : i / (state.layers - 1);
    weights.add(quantizeWeight(lerp(state.weightFrom, state.weightTo, t)));
  }

  for (const w of weights) {
    const colorT = descending
      ? (w - wMin) * invRange
      : 1 - (w - wMin) * invRange;

    ctx.font = `${w} ${size}px '${SANS}'`;
    const metrics = ctx.measureText(state.text);
    const tw = metrics.width;
    const ascent = metrics.actualBoundingBoxAscent || size * 0.8;
    const descent = metrics.actualBoundingBoxDescent || size * 0.2;
    const th = ascent + descent;
    const pad = size * 0.1;
    const cw = Math.ceil(tw + pad * 2);
    const ch = Math.ceil(th + pad * 2);

    const oc = document.createElement('canvas');
    oc.width = cw * dpr;
    oc.height = ch * dpr;
    const octx = oc.getContext('2d');
    octx.setTransform(dpr, 0, 0, dpr, 0, 0);
    octx.font = `${w} ${size}px '${SANS}'`;
    octx.fillStyle = scheme.fn(1 - colorT, bg.light);
    octx.textAlign = 'left';
    octx.textBaseline = 'alphabetic';
    octx.fillText(state.text, pad, ascent + pad);

    glyphCache.set(w, {
      canvas: oc,
      w: cw,             // logical width
      h: ch,             // logical height
      sw: cw * dpr,      // source width (pixel)
      sh: ch * dpr,      // source height (pixel)
    });
  }

  dirty = false;
}

// ─── TRANSFORM COMPUTATION ────────────────────────────────────
// Builds the layerData array (back-to-front draw order).
// All trig computed once here, not during draw.

function computeTransforms() {
  layerData.length = 0;
  const cx = W / 2, cy = H / 2;
  const mode = MODES[state.mode];
  const cosA = Math.cos(state.extrudeAngle);
  const sinA = Math.sin(state.extrudeAngle);
  const depth = state.extrudeDepth;

  // Curve: precompute control point
  let cpX = 0, cpY = 0, endX = 0, endY = 0;
  if (mode === 'CURVE') {
    endX = cosA * depth;
    endY = sinA * depth;
    const cpDist = depth * state.curvature;
    cpX = endX * 0.5 + (-sinA) * cpDist;
    cpY = endY * 0.5 + cosA * cpDist;
  }

  const invLayers = state.layers > 1 ? 1 / (state.layers - 1) : 0;

  for (let i = state.layers - 1; i >= 0; i--) {
    const t = i * invLayers;
    const weight = quantizeWeight(lerp(state.weightFrom, state.weightTo, t));
    const g = glyphCache.get(weight);
    if (!g) continue;

    const baseX = cx - g.w * 0.5;
    const baseY = cy - g.h * 0.5;
    let x = baseX, y = baseY, scale = 1, rotation = 0;

    switch (mode) {
      case 'LINEAR':
        x = baseX + cosA * depth * t;
        y = baseY + sinA * depth * t;
        break;

      case 'CURVE': {
        const mt = 1 - t;
        const mt2 = mt * mt;
        const t2 = t * t;
        const b2 = 2 * mt * t;
        x = baseX + b2 * cpX + t2 * endX;
        y = baseY + b2 * cpY + t2 * endY;
        break;
      }

      case 'SPIRAL': {
        const angle = t * state.spiralTurns * Math.PI * 2;
        const ta = state.extrudeAngle + angle;
        const dist = depth * state.spiralSpread * t;
        scale = 1 - t * state.spiralShrink;
        x = baseX + Math.cos(ta) * dist;
        y = baseY + Math.sin(ta) * dist;
        rotation = angle * 0.05;
        break;
      }
    }

    layerData.push({ g, x, y, scale, rotation });
  }

  needsRecompute = false;
}

// ─── RENDER ───────────────────────────────────────────────────

function paint(target, targetDpr) {
  const bg = BACKGROUNDS[state.bgIndex];
  target.fillStyle = bg.color;
  target.fillRect(0, 0, W, H);

  for (let i = 0, len = layerData.length; i < len; i++) {
    const L = layerData[i];
    const g = L.g;

    if (L.rotation !== 0 || L.scale !== 1) {
      // Transformed path: setTransform → translate → scale → rotate → draw → reset
      const pcx = (L.x + g.w * 0.5) * targetDpr;
      const pcy = (L.y + g.h * 0.5) * targetDpr;
      const s = L.scale * targetDpr;
      if (L.rotation !== 0) {
        const cos = Math.cos(L.rotation) * s;
        const sin = Math.sin(L.rotation) * s;
        target.setTransform(cos, sin, -sin, cos, pcx, pcy);
      } else {
        target.setTransform(s, 0, 0, s, pcx, pcy);
      }
      target.drawImage(g.canvas, -g.w * 0.5, -g.h * 0.5, g.w, g.h);
    } else {
      // Fast path: axis-aligned blit, no transform change needed
      target.setTransform(targetDpr, 0, 0, targetDpr, 0, 0);
      target.drawImage(g.canvas, 0, 0, g.sw, g.sh, L.x, L.y, g.w, g.h);
    }
  }

  // Reset transform
  target.setTransform(targetDpr, 0, 0, targetDpr, 0, 0);
}

// ─── ANIMATION LOOP ───────────────────────────────────────────

function loop() {
  if (dirty) buildGlyphCache();
  if (needsRecompute) computeTransforms();
  if (needsRepaint) {
    paint(ctx, dpr);
    needsRepaint = false;
    updateUI();
  }
  requestAnimationFrame(loop);
}

// ─── UI ───────────────────────────────────────────────────────

const ui = PT.ui({
  title: 'Extrude',
  hints: 'Drag aim · Scroll layers · Shift depth · Alt shape · 1–3 mode · C color · W flip · T text · S size · B bg · E export',
  theme: 'light',
});

// Keep the page background in sync with the chosen palette (light/dark flip only).
function updateUI() {
  const bg = BACKGROUNDS[state.bgIndex];
  const isLight = bg.light;
  if (prevLightClass !== isLight) {
    document.body.style.background = bg.color;
    prevLightClass = isLight;
  }
}

// ─── Theme: base light/dark. The nav switch (when embedded) drives this via #toggle;
// it is "on top" - flipping it resets the background to the white/black base. B still
// cycles all BACKGROUNDS entries as a local override until the next flip. ────────────
function applyTheme(dark) {
  state.bgIndex = dark ? BG_DARK_IDX : BG_LIGHT_IDX;
  prevLightClass = null;   // force the body-background resync in updateUI
  markDirty();             // glyph colors depend on bg.light, so rebuild the cache
}
document.getElementById('toggle').addEventListener('click', () => {
  const dark = document.body.classList.toggle('dark');
  ui.theme(dark ? 'dark' : 'light');
  applyTheme(dark);
});

// ─── INTERACTION ──────────────────────────────────────────────

canvas.addEventListener('pointerdown', (e) => {
  state.dragging = true;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('pointermove', (e) => {
  if (!state.dragging) return;
  const dx = e.clientX - W * 0.5;
  const dy = e.clientY - H * 0.5;
  state.extrudeAngle = Math.atan2(dy, dx);
  state.extrudeDepth = clamp(Math.sqrt(dx * dx + dy * dy) * 0.8, 20, Math.max(W, H) * 0.8);
  markRecompute();
});

canvas.addEventListener('pointerup', () => {
  state.dragging = false;
  canvas.style.cursor = '';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -1 : 1;
  const mode = MODES[state.mode];

  if (e.shiftKey) {
    state.extrudeDepth = clamp(state.extrudeDepth + delta * 10, 10, Math.max(W, H));
    markRecompute();
  } else if (e.altKey) {
    if (mode === 'CURVE') {
      state.curvature = clamp(state.curvature + delta * 0.05, -2, 2);
      markRecompute();
    } else if (mode === 'SPIRAL') {
      state.spiralTurns = clamp(state.spiralTurns + delta * 0.05, 0.05, 3);
      markRecompute();
    } else {
      state.layers = clamp(state.layers + delta, 3, 80);
      markDirty();
    }
  } else {
    state.layers = clamp(state.layers + delta, 3, 80);
    markDirty();
  }
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const key = e.key.toLowerCase();

  switch (key) {
    case 'e': exportPNG(); return;

    case 'r':
      Object.assign(state, DEFAULTS);
      markDirty();
      return;

    case 'm':
      state.mode = (state.mode + 1) % MODES.length;
      markRecompute();
      return;

    case 'b':
      state.bgIndex = (state.bgIndex + 1) % BACKGROUNDS.length;
      prevLightClass = null;
      markDirty();
      return;

    case 'c':
      state.colorIndex = (state.colorIndex + 1) % COLOR_SCHEMES.length;
      markDirty();
      return;

    case 'w': {
      const tmp = state.weightFrom;
      state.weightFrom = state.weightTo;
      state.weightTo = tmp;
      markDirty();
      return;
    }

    case 's': {
      const sizes = [0.35, 0.5, 0.65, 0.8, 1.0];
      const current = state.fontSize / Math.min(W, H);
      let closest = 0, minDist = Infinity;
      for (let i = 0; i < sizes.length; i++) {
        const d = Math.abs(sizes[i] - current);
        if (d < minDist) { minDist = d; closest = i; }
      }
      state.fontSize = Math.min(W, H) * sizes[(closest + 1) % sizes.length];
      markDirty();
      return;
    }

    case 't': {
      const input = prompt('Enter text:', state.text);
      if (input !== null && input.length > 0) {
        state.text = input;
        markDirty();
      }
      return;
    }
  }

  if (key >= '1' && key <= '3') {
    state.mode = parseInt(key) - 1;
    markRecompute();
  }
});

// ─── EXPORT ───────────────────────────────────────────────────

function exportPNG() {
  const xDpr = 2;
  const xCanvas = document.createElement('canvas');
  xCanvas.width = W * xDpr;
  xCanvas.height = H * xDpr;
  const xCtx = xCanvas.getContext('2d', { alpha: false });
  xCtx.setTransform(xDpr, 0, 0, xDpr, 0, 0);

  paint(xCtx, xDpr);

  xCanvas.toBlob((blob) => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `extrude-${state.text}-${MODES[state.mode].toLowerCase()}-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }, 'image/png');
}

// ─── INIT ─────────────────────────────────────────────────────

doResize();
window.addEventListener('resize', onResize);

const fallbackTimeout = setTimeout(markDirty, 3000);
document.fonts.ready.then(() => { clearTimeout(fallbackTimeout); markDirty(); });

requestAnimationFrame(loop);
</script>
</body>
</html>
