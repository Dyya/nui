<body>
<canvas id="c">Scale, a typographic scale builder. Requires JavaScript and an HTML5 canvas.</canvas>
<div id="toggle" title="Toggle theme"></div>
<script src="./core/ui.js"></script>
<script>
/**
 * SCALE - Typographic Scale System Builder
 * Pick a base size and mathematical scale ratio to generate
 * a complete type hierarchy: Display through Caption.
 * Four layout modes: Hierarchy, Paragraph, Compact, Code.
 */

var FONT = 'DM Sans';
var MONO = 'IBM Plex Mono';

// ─── BACKGROUNDS ──────────────────────────────────────────────

var BGS = [
  { name: 'Cream',      bg: '#F0EBE1', light: true },
  { name: 'White',      bg: '#FAFAFA', light: true },
  { name: 'Light Gray', bg: '#E8E8E8', light: true },
  { name: 'Black',      bg: '#0A0A0A', light: false },
  { name: 'Navy',       bg: '#0E1525', light: false },
];

// ─── ACCENT COLORS ────────────────────────────────────────────

var ACCENTS = [
  { name: 'Orange', hex: '#E8642D' },
  { name: 'Blue',   hex: '#5A78FF' },
  { name: 'Red',    hex: '#CC2233' },
  { name: 'Green',  hex: '#3ECF8E' },
  { name: 'Auto',   hex: null },
];

// ─── SCALE RATIOS ─────────────────────────────────────────────

var RATIOS = [
  { name: 'Minor Second',  value: 1.067 },
  { name: 'Major Second',  value: 1.125 },
  { name: 'Minor Third',   value: 1.200 },
  { name: 'Major Third',   value: 1.250 },
  { name: 'Perfect Fourth', value: 1.333 },
  { name: 'Aug. Fourth',   value: 1.414 },
  { name: 'Perfect Fifth', value: 1.500 },
  { name: 'Golden Ratio',  value: 1.618 },
];

// ─── HIERARCHY LEVELS ─────────────────────────────────────────

var LEVELS = [
  { name: 'DISPLAY', step: 5, defaultWeight: 800 },
  { name: 'H1',      step: 4, defaultWeight: 700 },
  { name: 'H2',      step: 3, defaultWeight: 600 },
  { name: 'H3',      step: 2, defaultWeight: 500 },
  { name: 'H4',      step: 1, defaultWeight: 500 },
  { name: 'BODY',    step: 0, defaultWeight: 400 },
  { name: 'SMALL',   step: -1, defaultWeight: 400 },
  { name: 'CAPTION', step: -2, defaultWeight: 400 },
];

var MODE_NAMES = ['HIERARCHY', 'PARAGRAPH', 'COMPACT', 'CODE'];

// ─── STATE ────────────────────────────────────────────────────

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d', { alpha: false });
var W, H, dpr;

var baseSize = 16;
var ratioIndex = 4; // nearest preset for display
var ratioValue = 1.333; // continuous ratio value
var bgIndex = Math.max(0, BGS.findIndex(function(b) { return b.bg === '#FAFAFA'; }));   // start on the plain white base
var accentIndex = 0;
var modeIndex = 0;
var weightOffset = 0; // global weight shift
var dirty = true;

var headlineText = 'The quick brown fox';
var bodyText = 'Typography is the craft of endowing human language with a durable visual form. It is an art that has evolved over centuries, from hand-carved inscriptions to digital screens, always in service of clarity, beauty, and meaning.';

// Computed scale cache
var scaleCache = null;

// ─── UI PANEL ─────────────────────────────────────────────────

var ui = PT.ui({
  title: 'Scale',
  hints: 'Scroll ratio · Shift base · 1–4 mode · C color · B bg · T text · E export · R reset',
  theme: 'light'
});

// ─── SCALE COMPUTATION ───────────────────────────────────────

function computeScale() {
  var levels = [];
  for (var i = 0; i < LEVELS.length; i++) {
    var L = LEVELS[i];
    var size = baseSize * Math.pow(ratioValue, L.step);
    var w = clampWeight(L.defaultWeight + weightOffset);
    levels.push({ name: L.name, size: size, weight: w, step: L.step });
  }
  scaleCache = levels;
  // Find nearest named preset for display
  var bestDist = Infinity;
  for (var j = 0; j < RATIOS.length; j++) {
    var d = Math.abs(RATIOS[j].value - ratioValue);
    if (d < bestDist) { bestDist = d; ratioIndex = j; }
  }
  return levels;
}

function clampWeight(w) {
  return Math.max(100, Math.min(900, Math.round(w / 100) * 100));
}

function getScale() {
  if (!scaleCache) computeScale();
  return scaleCache;
}

function invalidateScale() {
  scaleCache = null;
  dirty = true;
}

// ─── COLORS ───────────────────────────────────────────────────

function col() {
  var lt = BGS[bgIndex].light;
  var acc = ACCENTS[accentIndex];
  var accentHex;
  if (acc.hex) {
    accentHex = acc.hex;
  } else {
    accentHex = lt ? '#0A0A0A' : '#FAFAFA';
  }
  return {
    bg:      BGS[bgIndex].bg,
    text:    lt ? 'rgba(0,0,0,0.87)'   : 'rgba(255,255,255,0.87)',
    muted:   lt ? 'rgba(0,0,0,0.4)'    : 'rgba(255,255,255,0.4)',
    line:    lt ? 'rgba(0,0,0,0.08)'   : 'rgba(255,255,255,0.06)',
    label:   lt ? 'rgba(0,0,0,0.35)'   : 'rgba(255,255,255,0.3)',
    accent:  accentHex,
    accentA: hexToRgba(accentHex, 0.15),
    light:   lt,
  };
}

function hexToRgba(hex, a) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

// ─── Theme: base light/dark. The nav switch (when embedded) drives this via #toggle;
// it is "on top" - flipping it resets the background to the white/black base. B still
// cycles all BGS entries as a local override until the next flip. The ink (text +
// accent) already tracks BGS[bgIndex].light in col(), so the reset is legible for free.
var BG_LIGHT_IDX = Math.max(0, BGS.findIndex(function(b) { return b.bg === '#FAFAFA'; }));
var BG_DARK_IDX  = Math.max(0, BGS.findIndex(function(b) { return b.bg === '#0A0A0A'; }));
function applyTheme(dark) {
  bgIndex = dark ? BG_DARK_IDX : BG_LIGHT_IDX;
  document.body.style.background = BGS[bgIndex].bg;
  dirty = true;
}
document.getElementById('toggle').addEventListener('click', function() {
  var dark = document.body.classList.toggle('dark');
  ui.theme(dark ? 'dark' : 'light');
  applyTheme(dark);
});

// ─── RESIZE ───────────────────────────────────────────────────

var resizeTimer;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  dirty = true;
}
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 100);
});
resize();

// ─── FONT LOADING ─────────────────────────────────────────────

var fontTO = setTimeout(function() { dirty = true; }, 3000);
document.fonts.ready.then(function() {
  clearTimeout(fontTO);
  dirty = true;
});

// ─── DRAW HELPERS ─────────────────────────────────────────────

function setF(sz, wt) {
  ctx.font = (wt || 400) + ' ' + sz + "px '" + FONT + "'";
}

function setM(sz, wt) {
  ctx.font = (wt || 400) + ' ' + sz + "px '" + MONO + "'";
}

function clearBg(c) {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = c.bg;
  ctx.fillRect(0, 0, W, H);
}

// Word-wrap text, returns array of lines
function wrapText(text, maxWidth, fontSize, weight) {
  setF(fontSize, weight);
  var words = text.split(' ');
  var lines = [];
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = words[i];
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// ─── MODE 1: HIERARCHY ───────────────────────────────────────

function drawHierarchy() {
  var c = col();
  clearBg(c);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var scale = getScale();
  var padL = 40;
  var padR = 40;
  var padT = 72;

  // Compute row heights - clamp large display sizes to fit viewport
  var totalH = 0;
  var rowHeights = [];
  var maxRowH = (H - 120) / scale.length;
  for (var i = 0; i < scale.length; i++) {
    var rh = Math.min(Math.max(scale[i].size * 1.3, 32), maxRowH);
    rowHeights.push(rh);
    totalH += rh;
  }

  var startY = Math.max(padT, (H - totalH) / 2);
  var labelColW = 90;
  var sizeColW = 70;
  var sampleX = padL + labelColW + sizeColW;
  var maxSampleW = W - sampleX - padR;

  var y = startY;

  for (var i = 0; i < scale.length; i++) {
    var S = scale[i];
    var rowH = rowHeights[i];
    var baseY = y + rowH * 0.65; // text baseline

    // Separator line above (except first)
    if (i > 0) {
      ctx.strokeStyle = c.line;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(padL, Math.round(y) + 0.5);
      ctx.lineTo(W - padR, Math.round(y) + 0.5);
      ctx.stroke();
    }

    // Level name (mono, accent color)
    setM(9, 500);
    ctx.fillStyle = c.accent;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(S.name, padL, baseY);

    // Weight below name
    setM(9, 400);
    ctx.fillStyle = c.muted;
    ctx.fillText('w' + S.weight, padL, baseY + 13);

    // Computed size (mono, muted)
    setM(10, 400);
    ctx.fillStyle = c.muted;
    ctx.textAlign = 'left';
    ctx.fillText(S.size.toFixed(1) + 'px', padL + labelColW, baseY);

    // Sample text at computed size + weight
    setF(S.size, S.weight);
    ctx.fillStyle = c.text;
    ctx.textAlign = 'left';

    // Truncate if text overflows available width
    var sampleTxt = headlineText;
    if (ctx.measureText(sampleTxt).width > maxSampleW) {
      while (sampleTxt.length > 1 && ctx.measureText(sampleTxt + '\u2026').width > maxSampleW) {
        sampleTxt = sampleTxt.slice(0, -1);
      }
      sampleTxt += '\u2026';
    }
    ctx.fillText(sampleTxt, sampleX, baseY);

    y += rowH;
  }

  // Ratio name at bottom-right
  setM(10, 400);
  ctx.fillStyle = c.muted;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(RATIOS[ratioIndex].name + ' \u00B7 ' + RATIOS[ratioIndex].value, W - padR, H - 52);
  ctx.fillText('Base ' + baseSize + 'px', W - padR, H - 38);
}

// ─── MODE 2: PARAGRAPH ──────────────────────────────────────

function drawParagraph() {
  var c = col();
  clearBg(c);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var scale = getScale();
  // Find levels by name
  var display = scale[0];
  var h1 = scale[1];
  var h2 = scale[2];
  var h3 = scale[3];
  var body = scale[5];
  var caption = scale[7];

  var maxW = Math.min(W - 100, 720);
  var padL = Math.max(50, (W - maxW) / 2);
  var y = 80;

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // H1 headline (cap at reasonable size for paragraph view)
  var h1Size = Math.min(h1.size, H * 0.12);
  setF(h1Size, h1.weight);
  ctx.fillStyle = c.text;
  var h1Lines = wrapText(headlineText, maxW, h1Size, h1.weight);
  for (var i = 0; i < h1Lines.length; i++) {
    y += h1Size * 1.15;
    ctx.fillText(h1Lines[i], padL, y);
  }
  y += h1Size * 0.4;

  // Accent rule
  ctx.fillStyle = c.accent;
  ctx.fillRect(padL, Math.round(y), 48, 3);
  y += 24;

  // H3 subheading
  var h3Size = Math.min(h3.size, H * 0.06);
  setF(h3Size, h3.weight);
  ctx.fillStyle = c.muted;
  var subText = 'A typographic scale brings visual harmony';
  var subLines = wrapText(subText, maxW, h3Size, h3.weight);
  for (var i = 0; i < subLines.length; i++) {
    y += h3Size * 1.3;
    ctx.fillText(subLines[i], padL, y);
  }
  y += h3Size * 0.6;

  // Body paragraphs
  setF(body.size, body.weight);
  ctx.fillStyle = c.text;
  var bodyLines = wrapText(bodyText, maxW, body.size, body.weight);
  var lineH = body.size * 1.65;
  for (var i = 0; i < bodyLines.length; i++) {
    y += lineH;
    ctx.fillText(bodyLines[i], padL, y);
  }
  y += body.size * 1.2;

  // Pull quote at H2 weight
  var h2Size = Math.min(h2.size, H * 0.08);
  var quoteText = '\u201CClarity, beauty, and meaning.\u201D';
  setF(h2Size, h2.weight);
  ctx.fillStyle = c.accent;
  var quoteLines = wrapText(quoteText, maxW, h2Size, h2.weight);
  for (var i = 0; i < quoteLines.length; i++) {
    y += h2Size * 1.2;
    ctx.fillText(quoteLines[i], padL, y);
  }
  y += h2Size * 0.8;

  // Second body paragraph
  setF(body.size, body.weight);
  ctx.fillStyle = c.text;
  var body2 = 'Mathematical ratios have governed typographic hierarchies since the Renaissance. A consistent scale creates rhythm and predictability, guiding the reader through content with effortless clarity.';
  var body2Lines = wrapText(body2, maxW, body.size, body.weight);
  for (var i = 0; i < body2Lines.length; i++) {
    y += lineH;
    ctx.fillText(body2Lines[i], padL, y);
  }
  y += body.size * 1.0;

  // Caption
  setF(caption.size, caption.weight);
  ctx.fillStyle = c.muted;
  ctx.fillText(RATIOS[ratioIndex].name + ' \u00B7 ratio ' + RATIOS[ratioIndex].value + ' \u00B7 base ' + baseSize + 'px', padL, y + caption.size * 1.3);
}

// ─── MODE 3: COMPACT ────────────────────────────────────────

function drawCompact() {
  var c = col();
  clearBg(c);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var scale = getScale();
  var padL = 50;
  var padR = 50;
  var barMaxW = W - padL - padR - 140;

  // Find max size for normalization
  var maxSize = 0;
  for (var i = 0; i < scale.length; i++) {
    if (scale[i].size > maxSize) maxSize = scale[i].size;
  }

  var rowH = Math.min(48, (H - 160) / scale.length);
  var totalH = rowH * scale.length;
  var startY = (H - totalH) / 2;

  for (var i = 0; i < scale.length; i++) {
    var S = scale[i];
    var y = startY + i * rowH;
    var barW = (S.size / maxSize) * barMaxW;

    // Label (left)
    setM(9, 500);
    ctx.fillStyle = c.accent;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(S.name, padL + 60, y + rowH / 2);

    // Size value
    setM(9, 400);
    ctx.fillStyle = c.muted;
    ctx.textAlign = 'right';
    ctx.fillText(S.size.toFixed(1), padL + 110, y + rowH / 2);

    // Bar
    var barX = padL + 120;
    var barH = Math.max(4, rowH * 0.35);
    var barY = y + (rowH - barH) / 2;

    ctx.fillStyle = c.accentA;
    ctx.fillRect(barX, barY, barW, barH);

    // Bar accent end-cap
    ctx.fillStyle = c.accent;
    ctx.fillRect(barX + barW - 2, barY, 2, barH);

    // Weight label at end of bar
    setM(8, 400);
    ctx.fillStyle = c.muted;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('w' + S.weight, barX + barW + 8, y + rowH / 2);
  }

  // Title and ratio info
  setM(10, 400);
  ctx.fillStyle = c.muted;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(RATIOS[ratioIndex].name + ' \u00B7 ' + RATIOS[ratioIndex].value + ' \u00B7 base ' + baseSize + 'px', W / 2, startY - 20);
}

// ─── MODE 4: CODE ───────────────────────────────────────────

function drawCode() {
  var c = col();
  clearBg(c);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var scale = getScale();
  var lineH = 22;
  var fontSize = 13;

  // Build lines
  var lines = [];
  lines.push({ text: '/* Type Scale: ' + RATIOS[ratioIndex].name + ' (' + RATIOS[ratioIndex].value + ') */', type: 'comment' });
  lines.push({ text: '/* Base: ' + baseSize + 'px */', type: 'comment' });
  lines.push({ text: '', type: 'blank' });
  lines.push({ text: ':root {', type: 'bracket' });

  // Size tokens
  lines.push({ text: '  /* Sizes */', type: 'comment' });
  for (var i = 0; i < scale.length; i++) {
    var S = scale[i];
    var varName = '--font-' + S.name.toLowerCase();
    lines.push({ text: '  ' + varName + ': ' + S.size.toFixed(1) + 'px;', type: 'prop' });
  }

  lines.push({ text: '', type: 'blank' });
  lines.push({ text: '  /* Weights */', type: 'comment' });
  for (var i = 0; i < scale.length; i++) {
    var S = scale[i];
    var varName = '--weight-' + S.name.toLowerCase();
    lines.push({ text: '  ' + varName + ': ' + S.weight + ';', type: 'prop' });
  }

  lines.push({ text: '', type: 'blank' });
  lines.push({ text: '  /* Line Heights */', type: 'comment' });
  for (var i = 0; i < scale.length; i++) {
    var S = scale[i];
    var varName = '--lh-' + S.name.toLowerCase();
    var lh = S.step >= 2 ? '1.1' : S.step >= 0 ? '1.5' : '1.4';
    lines.push({ text: '  ' + varName + ': ' + lh + ';', type: 'prop' });
  }

  lines.push({ text: '}', type: 'bracket' });

  // Center the code block
  var totalH = lines.length * lineH;
  var startY = Math.max(60, (H - totalH) / 2);
  var startX = Math.max(50, (W - 440) / 2);

  // Code background panel
  var panelPad = 24;
  var panelW = 440;
  var panelH = totalH + panelPad * 2;
  var panelX = startX - panelPad;
  var panelY = startY - panelPad - 6;

  if (c.light) {
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
  }
  roundRect(panelX, panelY, panelW + panelPad * 2, panelH, 8);
  ctx.fill();

  // Border
  ctx.strokeStyle = c.line;
  ctx.lineWidth = 1;
  roundRect(panelX, panelY, panelW + panelPad * 2, panelH, 8);
  ctx.stroke();

  // Render lines
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  for (var i = 0; i < lines.length; i++) {
    var L = lines[i];
    var ly = startY + i * lineH;

    if (L.type === 'blank') continue;

    // Line number
    setM(10, 400);
    ctx.fillStyle = c.light ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.15)';
    var lineNum = String(i + 1);
    ctx.textAlign = 'right';
    ctx.fillText(lineNum, startX - 12, ly);
    ctx.textAlign = 'left';

    setM(fontSize, 400);
    if (L.type === 'comment') {
      ctx.fillStyle = c.muted;
    } else if (L.type === 'bracket') {
      ctx.fillStyle = c.text;
    } else {
      // Syntax highlight: variable name in accent, value in text
      var colonIdx = L.text.indexOf(':');
      if (colonIdx > -1) {
        var varPart = L.text.substring(0, colonIdx);
        var valPart = L.text.substring(colonIdx);
        ctx.fillStyle = c.accent;
        ctx.fillText(varPart, startX, ly);
        var varW = ctx.measureText(varPart).width;
        ctx.fillStyle = c.text;
        ctx.fillText(valPart, startX + varW, ly);
        continue;
      }
      ctx.fillStyle = c.text;
    }
    ctx.fillText(L.text, startX, ly);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── RENDER ─────────────────────────────────────────────────

function render() {
  if (!dirty) return;
  dirty = false;

  if (modeIndex === 0) drawHierarchy();
  else if (modeIndex === 1) drawParagraph();
  else if (modeIndex === 2) drawCompact();
  else if (modeIndex === 3) drawCode();

  updateUI();
}

// ─── UI UPDATE ──────────────────────────────────────────────

function updateUI() {
  document.body.style.background = BGS[bgIndex].bg;
}

// ─── KEYBOARD ───────────────────────────────────────────────

window.addEventListener('keydown', function(e) {
  if (e.repeat || e.metaKey || e.ctrlKey) return;
  var k = e.key.toLowerCase();

  // Number keys 1-4 for direct mode
  if (k >= '1' && k <= '4') {
    modeIndex = parseInt(k) - 1;
    invalidateScale();
    return;
  }

  switch (k) {
    case 'm':
      modeIndex = (modeIndex + 1) % MODE_NAMES.length;
      dirty = true;
      return;

    case 'b':
      bgIndex = (bgIndex + 1) % BGS.length;
      dirty = true;
      return;

    case 'c':
      accentIndex = (accentIndex + 1) % ACCENTS.length;
      dirty = true;
      return;

    case 't':
      var newH = prompt('Headline text:', headlineText);
      if (newH !== null && newH.length > 0) {
        headlineText = newH;
        dirty = true;
      }
      return;

    case 'e':
      exportPNG();
      return;

    case 'r':
      baseSize = 16;
      ratioIndex = 4;
      ratioValue = 1.333;
      bgIndex = BG_LIGHT_IDX;
      accentIndex = 0;
      modeIndex = 0;
      weightOffset = 0;
      headlineText = 'The quick brown fox';
      bodyText = 'Typography is the craft of endowing human language with a durable visual form. It is an art that has evolved over centuries, from hand-carved inscriptions to digital screens, always in service of clarity, beauty, and meaning.';
      document.body.style.background = BGS[bgIndex].bg;
      invalidateScale();
      return;
  }
});

// ─── SCROLL / WHEEL ─────────────────────────────────────────

window.addEventListener('wheel', function(e) {
  e.preventDefault();
  var delta = e.deltaY > 0 ? 1 : -1;

  if (e.shiftKey) {
    baseSize = Math.max(12, Math.min(24, baseSize + delta));
  } else if (e.altKey) {
    weightOffset = Math.max(-400, Math.min(400, weightOffset + delta * 100));
  } else {
    // Smooth continuous ratio adjustment
    ratioValue = Math.max(1.02, Math.min(1.8, ratioValue + delta * 0.01));
  }
  scaleCache = null;
  dirty = true;
}, { passive: false });

// ─── EXPORT ─────────────────────────────────────────────────

function exportPNG() {
  var savedDpr = dpr;

  dpr = 2;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ui.hide();

  dirty = true;
  render();

  canvas.toBlob(function(blob) {
    if (!blob) {
      console.error('Export failed: null blob');
      restore();
      return;
    }
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'scale-' + MODE_NAMES[modeIndex].toLowerCase() + '-' + RATIOS[ratioIndex].name.toLowerCase().replace(/[\s.]/g, '-') + '-' + baseSize + 'px.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
    restore();
  });

  function restore() {
    dpr = savedDpr;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ui.show();
    dirty = true;
  }
}

// ─── LOOP ───────────────────────────────────────────────────

function loop() {
  render();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
