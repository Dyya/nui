<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #0a0a0c; --fg: rgba(255,255,255,0.92); --fg-dim: rgba(255,255,255,0.45); --fg-faint: rgba(255,255,255,0.18);
    --grid: rgba(255,255,255,0.018); --chrome-bg: rgba(20,20,24,0.85); --chrome-bd: rgba(255,255,255,0.08);

  }
  body.light { --bg: #FAFAFA; --fg: rgba(0,0,0,0.88); --fg-dim: rgba(0,0,0,0.45); --fg-faint: rgba(0,0,0,0.15); --grid: rgba(0,0,0,0.03); --chrome-bg: rgba(255,255,255,0.88); --chrome-bd: rgba(0,0,0,0.08); --accent: #FBF251; --obj: rgb(98,103,113); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; cursor: none; transition: background 0.4s; }

  #toggle{position:fixed;bottom:16px;right:16px;z-index:9998;width:30px;height:30px;border-radius:50%;cursor:pointer;pointer-events:auto;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);background:rgba(10,10,10,.35);border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;transition:transform .2s;}
  #toggle::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--fg);}
  #toggle:hover{transform:scale(1.08);}

  #cursor { position: fixed; left: 0; top: 0; width: 20px; height: 20px; border: 1.5px solid var(--fg); border-radius: 50%; pointer-events: none; z-index: 100; transform: translate(-50%, -50%); transition: border-color 0.2s; }
  #cursor::before, #cursor::after { content: ''; position: absolute; background: var(--fg); }
  #cursor::before { top: 50%; left: -3px; right: -3px; height: 1px; transform: translateY(-50%); }
  #cursor::after { left: 50%; top: -3px; bottom: -3px; width: 1px; transform: translateX(-50%); }
  #cursor.drag { border-color: var(--fg); }
  #cursor.typing { border-color: var(--fg); opacity: 0.5; }
  #prompt-input {
    position: fixed; pointer-events: auto; z-index: 50;
    background: var(--chrome-bg); color: var(--fg);
    border: 1px solid var(--chrome-bd);

    display: none;

  }
  #prompt-input::placeholder { color: var(--fg-dim); }

<body class="light">
  <canvas id="c"></canvas>
  <div id="toggle" title="Toggle theme"></div>
  <div id="cursor"></div>
  <input id="prompt-input" type="text" placeholder="/ ask…" maxlength="80" />
<script src="../typography/core/ui.js"></script>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const dpr = Math.min(devicePixelRatio || 1, 2);
const cursor = document.getElementById('cursor');
const readout = { set innerHTML(v){}, set textContent(v){} };
const promptInput = document.getElementById('prompt-input');
const css = (v) => getComputedStyle(document.body).getPropertyValue(v).trim();

const ui = PT.ui({ title: 'Inline AI', hints: '/ open prompt · Enter apply · Esc cancel · Drag move · R reseed', theme: 'light' });
const toggle = document.getElementById('toggle');
toggle.addEventListener('click', () => { const dark = document.body.classList.toggle('dark'); document.body.classList.toggle('light', !dark); ui.theme(dark ? 'dark' : 'light'); });

// state BEFORE resize
let W = 0, H = 0;
let seed = 515151;
let shapes = [];
let drag = null;
let mx = -100, my = -100;
let prompt = null; // { x, y, context: [ids], preview: string | null, resolving: boolean }
let lastResponse = null; // { text, t0, x, y, appliedIds: [] }
let appliedFlashes = []; // [{id, t0}]

const PALETTE = ['#45ED8C', '#33EBD7', '#29A5EA', '#2043E9', '#5016DF', '#D6409F'];
const PROMPT_SCOPE_RADIUS = 220;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  C.width = W * dpr; C.height = H * dpr;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
  layout();
}
function layout() { if (shapes.length === 0) build(); }
resize();
window.addEventListener('resize', resize);

function mulberry32(s) { return function() { let t = (s += 0x6D2B79F5); t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function build() {
  const rng = mulberry32(seed);
  shapes = [];
  const positions = [
    [0.2, 0.3], [0.3, 0.42], [0.25, 0.55],   // left cluster
    [0.55, 0.28], [0.65, 0.4], [0.55, 0.52], [0.72, 0.46],  // middle cluster
    [0.85, 0.7], [0.75, 0.78],  // lower-right cluster
    [0.15, 0.78],  // lone shape lower-left
  ];
  for (let i = 0; i < positions.length; i++) {
    const [nx, ny] = positions[i];
    shapes.push({
      id: i + 1,
      x: nx * W, y: ny * H,
      size: 30 + rng() * 14,
      color: null,   // grey by default; the AI colour commands can paint a hue on request
    });
  }
}


function drawShape(s) {
  const inContext = prompt && prompt.context.includes(s.id);
  const flash = appliedFlashes.find(f => f.id === s.id);
  const isDrag = drag && drag.id === s.id;
  X.save();
  // grey at rest; the dragged shape is the one charged thing (bare accent); a colour the
  // AI painted on request stays as its hue (that command is the tool's own output).
  X.fillStyle = isDrag ? '#FBF251' : (s.color || css('--obj'));
  X.beginPath(); X.arc(s.x, s.y, s.size, 0, Math.PI * 2); X.fill();
  X.restore();
  // Context ring - the objects the prompt is scoped to (neutral dashed)
  if (inContext) {
    X.save();
    X.strokeStyle = css('--fg-dim');
    X.globalAlpha = 0.9;
    X.lineWidth = 1.2;
    X.setLineDash([3, 3]);
    X.beginPath(); X.arc(s.x, s.y, s.size + 6, 0, Math.PI * 2); X.stroke();
    X.restore();
  }
  // Apply flash - an expanding ink ring after the command lands
  if (flash) {
    const age = (performance.now() - flash.t0) / 600;
    if (age < 1) {
      X.save();
      X.strokeStyle = css('--fg');
      X.globalAlpha = (1 - age) * 0.8;
      X.lineWidth = 1.5;
      X.beginPath(); X.arc(s.x, s.y, s.size + 4 + age * 30, 0, Math.PI * 2); X.stroke();
      X.restore();
    }
  }
}

function drawPromptRing() {
  if (!prompt) return;
  X.save();
  // Scope circle (where "nearby" is)
  X.strokeStyle = css('--fg-faint');
  X.globalAlpha = 0.9;
  X.lineWidth = 1;
  X.setLineDash([2, 5]);
  X.beginPath(); X.arc(prompt.x, prompt.y, PROMPT_SCOPE_RADIUS, 0, Math.PI * 2); X.stroke();
  X.restore();
  // Dashed connector lines from prompt to each context object (faint)
  X.save();
  X.strokeStyle = css('--fg-dim');
  X.globalAlpha = 0.5;
  X.lineWidth = 0.8;
  X.setLineDash([2, 3]);
  for (const id of prompt.context) {
    const s = shapes.find(x => x.id === id);
    if (s) { X.beginPath(); X.moveTo(prompt.x, prompt.y); X.lineTo(s.x, s.y); X.stroke(); }
  }
  X.restore();
  // Context chip above the input
  drawContextChip();
}

function drawContextChip() {
  if (!prompt) return;
  const n = prompt.context.length;
  const text = n === 0 ? 'NO NEARBY CONTEXT' : `CONTEXT · ${n} NEARBY`;
  X.save();
  X.font = '9px "IBM Plex Mono", monospace';
  const tW = X.measureText(text).width;
  const padX = 8, padY = 3;
  const bw = tW + padX * 2;
  const bh = 18;
  const bx = prompt.x - 140;
  const by = prompt.y - 42;
  X.fillStyle = css('--chrome-bg');
  X.strokeStyle = css('--fg-dim');
  X.lineWidth = 1;
  X.fillRect(bx, by, bw, bh);
  X.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
  X.fillStyle = css('--fg');
  X.textAlign = 'left';
  X.textBaseline = 'middle';
  X.fillText(text, bx + padX, by + bh / 2 + 1);
  X.restore();
}

function drawLastResponse() {
  if (!lastResponse) return;
  const age = (performance.now() - lastResponse.t0) / 2800;
  if (age > 1) { lastResponse = null; return; }
  X.save();
  X.globalAlpha = (1 - age) * 0.95;
  X.font = '600 11px "IBM Plex Mono", monospace';
  const text = lastResponse.text;
  const tW = X.measureText(text).width;
  const padX = 10, padY = 5;
  const bw = tW + padX * 2;
  const bh = 22;
  const bx = lastResponse.x - bw / 2;
  const by = lastResponse.y - 36;
  X.fillStyle = css('--chrome-bg');
  X.strokeStyle = css('--fg-dim');
  X.lineWidth = 1;
  X.fillRect(bx, by, bw, bh);
  X.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
  X.fillStyle = css('--fg');
  X.textAlign = 'center';
  X.textBaseline = 'middle';
  X.fillText(text, lastResponse.x, by + bh / 2 + 1);
  X.restore();
}

function draw() {
  X.clearRect(0, 0, W, H);
  drawPromptRing();
  for (const s of shapes) drawShape(s);
  // Cursor marker during prompt
  if (prompt) {
    X.save();
    X.strokeStyle = css('--fg-dim');
    X.globalAlpha = 0.9;
    X.lineWidth = 1;
    X.beginPath(); X.arc(prompt.x, prompt.y, 4, 0, Math.PI * 2); X.stroke();
    X.restore();
  }
  drawLastResponse();
  // Clean up expired flashes
  appliedFlashes = appliedFlashes.filter(f => (performance.now() - f.t0) / 600 < 1);
  // Chrome
  readout.innerHTML = prompt ? `Prompt open · Context <b>${prompt.context.length}</b>` : `Objects <b>${shapes.length}</b>`;
}

function loop() { draw(); requestAnimationFrame(loop); }
loop();

function contextAt(x, y) {
  return shapes.filter(s => Math.hypot(x - s.x, y - s.y) < PROMPT_SCOPE_RADIUS).map(s => s.id);
}

function openPrompt(x, y) {
  prompt = { x, y, context: contextAt(x, y) };
  promptInput.style.display = 'block';
  promptInput.style.left = (x + 12) + 'px';
  promptInput.style.top = (y - 14) + 'px';
  promptInput.value = '';
  promptInput.focus();
  cursor.classList.add('typing');
}
function closePrompt() {
  prompt = null;
  promptInput.style.display = 'none';
  promptInput.value = '';
  cursor.classList.remove('typing');
}

// Simulated AI - pattern-matches common commands to demo the UX
function resolvePrompt(text, context) {
  const lower = text.toLowerCase().trim();
  const ctxShapes = context.map(id => shapes.find(s => s.id === id)).filter(Boolean);
  if (ctxShapes.length === 0) {
    return { text: '✗ No targets in range', appliedIds: [] };
  }
  // Color commands
  const colorWords = { red: '#FF3D5A', blue: '#5A78FF', green: '#3DDC84', yellow: '#E8B54D', orange: '#E8642D', pink: '#E85A8E', purple: '#9A5AFF', cyan: '#28CFE0' };
  for (const [word, hex] of Object.entries(colorWords)) {
    if (lower.includes(word)) {
      for (const s of ctxShapes) s.color = hex;
      return { text: `✓ Set ${ctxShapes.length} to ${word}`, appliedIds: ctxShapes.map(s => s.id) };
    }
  }
  // Size commands
  if (/\b(smaller|shrink|small)\b/.test(lower)) {
    for (const s of ctxShapes) s.size = Math.max(12, s.size * 0.75);
    return { text: `✓ Shrunk ${ctxShapes.length}`, appliedIds: ctxShapes.map(s => s.id) };
  }
  if (/\b(larger|bigger|big|grow)\b/.test(lower)) {
    for (const s of ctxShapes) s.size = Math.min(80, s.size * 1.3);
    return { text: `✓ Grew ${ctxShapes.length}`, appliedIds: ctxShapes.map(s => s.id) };
  }
  // Alignment
  if (/\balign|line.?up|straighten\b/.test(lower)) {
    const avgY = ctxShapes.reduce((s, x) => s + x.y, 0) / ctxShapes.length;
    for (const s of ctxShapes) s.y = avgY;
    return { text: `✓ Aligned ${ctxShapes.length}`, appliedIds: ctxShapes.map(s => s.id) };
  }
  // Spread / distribute
  if (/\b(spread|distribute|space)\b/.test(lower)) {
    ctxShapes.sort((a, b) => a.x - b.x);
    const first = ctxShapes[0], last = ctxShapes[ctxShapes.length - 1];
    const step = (last.x - first.x) / Math.max(1, ctxShapes.length - 1);
    for (let i = 0; i < ctxShapes.length; i++) ctxShapes[i].x = first.x + i * step;
    return { text: `✓ Spread ${ctxShapes.length}`, appliedIds: ctxShapes.map(s => s.id) };
  }
  // Group / cluster
  if (/\b(group|cluster|gather|together)\b/.test(lower)) {
    const cx = ctxShapes.reduce((s, x) => s + x.x, 0) / ctxShapes.length;
    const cy = ctxShapes.reduce((s, x) => s + x.y, 0) / ctxShapes.length;
    for (const s of ctxShapes) {
      s.x = cx + (s.x - cx) * 0.4;
      s.y = cy + (s.y - cy) * 0.4;
    }
    return { text: `✓ Clustered ${ctxShapes.length}`, appliedIds: ctxShapes.map(s => s.id) };
  }
  // Random / shuffle
  if (/\b(random|shuffle|scatter|mix)\b/.test(lower)) {
    for (const s of ctxShapes) s.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    return { text: `✓ Reseeded color on ${ctxShapes.length}`, appliedIds: ctxShapes.map(s => s.id) };
  }
  // Delete
  if (/\b(delete|remove|clear|kill)\b/.test(lower)) {
    const ids = new Set(ctxShapes.map(s => s.id));
    shapes = shapes.filter(s => !ids.has(s.id));
    return { text: `✓ Removed ${ids.size}`, appliedIds: [] };
  }
  return { text: `✗ "${text}" not understood`, appliedIds: [] };
}

function submitPrompt() {
  if (!prompt) return;
  const text = promptInput.value.trim();
  if (!text) { closePrompt(); return; }
  const res = resolvePrompt(text, prompt.context);
  lastResponse = { text: res.text, t0: performance.now(), x: prompt.x, y: prompt.y };
  for (const id of res.appliedIds) appliedFlashes.push({ id, t0: performance.now() });
  closePrompt();
}

promptInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { submitPrompt(); }
  else if (e.key === 'Escape') { closePrompt(); }
});
promptInput.addEventListener('input', () => {
  // Keep context snapshot - it's frozen when prompt opened
});
promptInput.addEventListener('blur', () => {
  // If user clicked away without committing, cancel
  if (prompt && !promptInput.value.trim()) closePrompt();
});

function hit(x, y) {
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    if (Math.hypot(x - s.x, y - s.y) < s.size + 3) return s;
  }
  return null;
}

window.addEventListener('pointermove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  if (drag) {
    const s = shapes.find(x => x.id === drag.id);
    if (s) { s.x = mx - drag.offX; s.y = my - drag.offY; }
  }
});
window.addEventListener('pointerdown', e => {
  if (prompt) { closePrompt(); return; }
  const h = hit(e.clientX, e.clientY);
  if (h) {
    drag = { id: h.id, offX: e.clientX - h.x, offY: e.clientY - h.y };
    cursor.classList.add('drag');
  }
});
window.addEventListener('pointerup', () => {
  drag = null;
  cursor.classList.remove('drag');
});
window.addEventListener('keydown', e => {
  // Don't intercept when focused in the prompt input
  if (document.activeElement === promptInput) return;
  if (e.key === '/') {
    e.preventDefault();
    openPrompt(mx, my);
  } else if (e.key === 'Escape') {
    if (prompt) closePrompt();
  } else if (e.key === 'r' || e.key === 'R') {
    shapes = []; build();
  }
});
</script>
</body>
