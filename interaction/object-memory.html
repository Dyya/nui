<style>
:root {
  --bg: #0a0a0c;
  --doc: #16161A;
  --fg: rgba(255,255,255,0.95);
  --dim: rgba(255,255,255,0.15);
  --mid: rgba(255,255,255,0.25);
  --active: rgba(255,255,255,0.5);
  --hover: rgba(255,255,255,0.7);
  --obj: rgb(132,137,148);
  --grid: rgba(255,255,255,0.015);
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
body.light {
  --bg: #FAFAFA;
  --doc: #EDEDEF;
  --fg: rgba(0,0,0,0.95);
  --dim: rgba(0,0,0,0.15);
  --mid: rgba(0,0,0,0.28);
  --active: rgba(0,0,0,0.5);
  --hover: rgba(0,0,0,0.75);
  --obj: rgb(98,103,113);
  --grid: rgba(0,0,0,0.03);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; cursor: none; transition: background 0.4s var(--ease); }

#c { position: fixed; inset: 0; z-index: 1; }


#toggle{position:fixed;bottom:16px;right:16px;z-index:9998;width:30px;height:30px;border-radius:50%;cursor:pointer;pointer-events:auto;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);background:rgba(10,10,10,.35);border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;transition:transform .2s;}
#toggle::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--fg);}
  #toggle:hover{transform:scale(1.08);}
body.light #toggle{background:rgba(255,255,255,.5);border-color:rgba(0,0,0,.06);color:rgba(0,0,0,.55);}

.cursor { position: fixed; z-index: 50; pointer-events: none; width: 28px; height: 28px; transform: translate(-50%, -50%); }
.cursor .ring { position: absolute; inset: 0; border: 1px solid var(--mid); border-radius: 50%; transition: all 0.25s var(--ease); }
.cursor .cross { position: absolute; left: 50%; top: 50%; background: var(--mid); transform: translate(-50%, -50%); transition: background 0.25s var(--ease); }
.cursor .cross.h { width: 10px; height: 1px; }
.cursor .cross.v { width: 1px; height: 10px; }
body.mem  .cursor .ring { border-color: var(--fg); transform: scale(1.4); border-style: dashed; }
body.mem  .cursor .cross { background: var(--fg); }
body.dragging .cursor .ring { border-color: var(--fg); transform: scale(1.5); }
body.dragging .cursor .cross { background: var(--fg); }

<body class="light">
<canvas id="c"></canvas>

<div id="toggle" title="Toggle theme"></div>

<div class="cursor" id="cursor">
  <div class="ring"></div>
  <div class="cross h"></div>
  <div class="cross v"></div>
</div>

<script src="../typography/core/ui.js"></script>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const ui = PT.ui({ title: 'Object memory', hints: 'Drag move shape · M hold memory · Click ghost revert · R reset', theme: 'light' });
let W = 0, H = 0;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

let shapes = [];
let mouseX = -100, mouseY = -100;
let keyM = false;
let drag = null;       // { id, dx, dy }
let hoveredId = 0;
let hoveredGhost = null; // { shapeId, index }
let seed = 202020;

let docX = 0, docY = 0, docSize = 0;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  C.width = W * dpr; C.height = H * dpr;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
  layout();
}
function layout() {
  docSize = Math.min(W, H) * 0.76;
  docX = (W - docSize) / 2;
  docY = (H - docSize) / 2;
}
resize();
window.addEventListener('resize', resize);

function mulberry32(s) {
  return function() {
    let t = (s += 0x6D2B79F5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function regen() {
  const rng = mulberry32(seed);
  shapes = [];
  let tries = 0;
  while (shapes.length < 6 && tries < 2000) {
    const nx = 0.18 + rng() * 0.64;
    const ny = 0.18 + rng() * 0.64;
    const nr = 0.048 + rng() * 0.02;
    let ok = true;
    for (const o of shapes) if (Math.hypot(nx - o.nx, ny - o.ny) < nr + o.nr + 0.08) { ok = false; break; }
    if (ok) {
      const x = nx * docSize;
      const y = ny * docSize;
      const r = nr * docSize;
      shapes.push({
        id: shapes.length + 1,
        nx, ny, nr,
        x, y, r,
        history: [{ x, y, time: performance.now() }],
      });
    }
    tries++;
  }
}
regen();

function hitShape(sx, sy) {
  const px = sx - docX, py = sy - docY;
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    if (Math.hypot(px - s.x, py - s.y) < s.r) return s;
  }
  return null;
}
function hitGhost(sx, sy) {
  if (!keyM || !hoveredId) return null;
  const s = shapes.find(x => x.id === hoveredId);
  if (!s) return null;
  const px = sx - docX, py = sy - docY;
  // Check all history entries (ghost circles), skip last (that's the current position)
  const lastIdx = s.history.length - 1;
  for (let i = 0; i < lastIdx; i++) {
    const h = s.history[i];
    if (Math.hypot(px - h.x, py - h.y) < s.r * 0.75) {
      return { shapeId: s.id, index: i };
    }
  }
  return null;
}

function drawShapeAt(s, x, y, alpha = 1, fill = null) {
  X.save();
  // Flat solid fill - grey at rest, accent when charged.
  X.globalAlpha = alpha;
  X.fillStyle = fill || getComputedStyle(document.body).getPropertyValue('--obj');
  X.beginPath();
  X.arc(x, y, s.r, 0, Math.PI * 2);
  X.fill();
  // ink hairline so the charged (yellow) shape reads on the near-white ground
  X.restore();
}

function formatAge(ms) {
  const s = Math.round(ms / 1000);
  if (s < 5) return 'now';
  if (s < 60) return `-${s}s`;
  return `-${Math.round(s / 60)}m`;
}

function draw() {
  X.clearRect(0, 0, W, H);
  X.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg').trim();
  X.fillRect(0, 0, W, H);
  X.fillStyle = getComputedStyle(document.body).getPropertyValue('--doc').trim();
  X.fillRect(docX, docY, docSize, docSize);

  const now = performance.now();

  // If memory mode + hovered shape, draw its trail BEHIND all shapes
  if (keyM && hoveredId) {
    const s = shapes.find(x => x.id === hoveredId);
    if (s && s.history.length > 1) {
      X.save();
      // Dashed timeline connecting history entries chronologically
      X.strokeStyle = getComputedStyle(document.body).getPropertyValue('--mid');
      X.lineWidth = 1;
      X.setLineDash([4, 4]);
      X.beginPath();
      X.moveTo(docX + s.history[0].x, docY + s.history[0].y);
      for (let i = 1; i < s.history.length; i++) {
        X.lineTo(docX + s.history[i].x, docY + s.history[i].y);
      }
      X.stroke();
      X.setLineDash([]);
      X.restore();

      // Ghost circles for each history entry except the last (current)
      const lastIdx = s.history.length - 1;
      for (let i = 0; i < lastIdx; i++) {
        const h = s.history[i];
        const x = docX + h.x, y = docY + h.y;
        // Gradient: older = dimmer
        const t = (i + 1) / (lastIdx + 1);       // 0..1 where newer is bigger
        const alpha = 0.2 + t * 0.35;
        const isHoveredGhost = hoveredGhost && hoveredGhost.shapeId === s.id && hoveredGhost.index === i;
        // the ghost under the cursor is the state about to be reverted to - the charged one
        drawShapeAt(s, x, y, isHoveredGhost ? 1 : alpha, isHoveredGhost ? '#FBF251' : null);

        // Age label
        X.save();
        X.font = '9px "IBM Plex Mono", monospace';
        X.fillStyle = getComputedStyle(document.body).getPropertyValue('--active');
        X.textAlign = 'center';
        X.textBaseline = 'top';
        X.fillText(formatAge(now - h.time), x, y + s.r + 6);
        X.restore();
      }
    }
  }

  // Draw current shapes
  for (const s of shapes) {
    const isDragging = drag && drag.id === s.id;
    const isHov = !keyM && s.id === hoveredId && !isDragging;
    let x = docX + s.x, y = docY + s.y;

    // If memory mode + hovered ghost, preview that state for the hovered shape
    if (keyM && hoveredGhost && hoveredGhost.shapeId === s.id) {
      const ghostState = s.history[hoveredGhost.index];
      // Show the current shape dimmed + charged preview at the ghost state being reverted to
      drawShapeAt(s, x, y, 0.25);
      drawShapeAt(s, docX + ghostState.x, docY + ghostState.y, 1, '#FBF251');
      continue;
    }

    // the shape under interaction (dragged / hovered / memory-hovered) is the charged one
    const charged = isDragging || isHov || (keyM && s.id === hoveredId);
    drawShapeAt(s, x, y, 1, charged ? '#FBF251' : null);
  }

  // Doc border
  X.strokeStyle = document.body.classList.contains('light') ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.08)';
  X.lineWidth = 1;
  X.strokeRect(docX - 0.5, docY - 0.5, docSize + 1, docSize + 1);

  requestAnimationFrame(draw);
}

// ───── Input ─────
const readout = { set innerHTML(v){}, set textContent(v){} };
const cursor  = document.getElementById('cursor');
const toggle  = document.getElementById('toggle');

window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top  = mouseY + 'px';

  if (drag) {
    const s = shapes.find(x => x.id === drag.id);
    if (s) {
      s.x = clamp((mouseX - docX) - drag.dx, s.r, docSize - s.r);
      s.y = clamp((mouseY - docY) - drag.dy, s.r, docSize - s.r);
    }
    return;
  }

  // Hover detection
  const h = hitShape(mouseX, mouseY);
  hoveredId = h ? h.id : 0;
  // Ghost hover only if memory mode
  hoveredGhost = keyM ? hitGhost(mouseX, mouseY) : null;
});

window.addEventListener('mousedown', (e) => {
  if (e.target.closest('#toggle')) return;
  if (e.button !== 0) return;

  // Memory mode: click on ghost = revert
  if (keyM && hoveredGhost) {
    const s = shapes.find(x => x.id === hoveredGhost.shapeId);
    if (s) {
      const targetIdx = hoveredGhost.index;
      const targetState = s.history[targetIdx];
      // Truncate history to that point
      s.history = s.history.slice(0, targetIdx + 1);
      s.x = targetState.x;
      s.y = targetState.y;
      hoveredGhost = null;
    }
    return;
  }

  // Normal drag
  const h = hitShape(e.clientX, e.clientY);
  if (!h) return;
  if (keyM) return;  // no dragging in memory mode
  drag = {
    id: h.id,
    dx: (e.clientX - docX) - h.x,
    dy: (e.clientY - docY) - h.y,
  };
  document.body.classList.add('dragging');
});

window.addEventListener('mouseup', () => {
  if (!drag) return;
  const s = shapes.find(x => x.id === drag.id);
  if (s) {
    const last = s.history[s.history.length - 1];
    const moved = Math.hypot(s.x - last.x, s.y - last.y);
    if (moved > 4) {
      s.history.push({ x: s.x, y: s.y, time: performance.now() });
    }
  }
  drag = null;
  document.body.classList.remove('dragging');
});

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (k === 'm') {
    keyM = true;
    document.body.classList.add('mem');
    hoveredGhost = hitGhost(mouseX, mouseY);
  }
  if (k === 'r' && !drag) {
    for (const s of shapes) {
      s.history = [{ x: s.history[0].x, y: s.history[0].y, time: performance.now() }];
      s.x = s.history[0].x;
      s.y = s.history[0].y;
    }
  }
});
window.addEventListener('keyup', (e) => {
  if (e.key.toLowerCase() === 'm') {
    keyM = false;
    document.body.classList.remove('mem');
    hoveredGhost = null;
  }
});

toggle.addEventListener('click', () => {
  const dark = document.body.classList.toggle('dark');
  document.body.classList.toggle('light', !dark);
  ui.theme(dark ? 'dark' : 'light');
});

function updateInfo() {
  const total = shapes.reduce((n, s) => n + s.history.length, 0);
  if (keyM && hoveredId) {
    const s = shapes.find(x => x.id === hoveredId);
    const now = performance.now();
    const n = s.history.length;
    if (hoveredGhost) {
      const h = s.history[hoveredGhost.index];
      readout.innerHTML = `Shape <b>${String(s.id).padStart(2, '0')}</b> · State <b>${hoveredGhost.index + 1}/${n}</b> · ${formatAge(now - h.time)}`;
    } else {
      readout.innerHTML = `Shape <b>${String(s.id).padStart(2, '0')}</b> · <b>${n}</b> state${n > 1 ? 's' : ''}`;
    }
  } else if (drag) {
    readout.innerHTML = `Drag shape <b>${String(drag.id).padStart(2, '0')}</b> · <b>${total}</b> states`;
  } else {
    readout.innerHTML = `Memory · <b>${total}</b> states`;
  }
}
setInterval(updateInfo, 50);

draw();
</script>
</body>
</html>
