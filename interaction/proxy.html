<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  canvas { position: fixed; inset: 0; display: block; }
  #toggle{position:fixed;bottom:16px;right:16px;z-index:9998;width:30px;height:30px;border-radius:50%;cursor:pointer;pointer-events:auto;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);background:rgba(10,10,10,.35);border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;transition:transform .2s;}

  #cursor { position: fixed; left: 0; top: 0; width: 20px; height: 20px; border: 1.5px solid var(--fg); border-radius: 50%; pointer-events: none; z-index: 100; transform: translate(-50%, -50%); transition: border-color 0.2s; }
  #cursor::before, #cursor::after { content: ''; position: absolute; background: var(--fg); }
  #cursor::before { top: 50%; left: -3px; right: -3px; height: 1px; transform: translateY(-50%); }
  #cursor::after { left: 50%; top: -3px; bottom: -3px; width: 1px; transform: translateX(-50%); }
  #cursor.proxy { border-color: var(--fg); }
  #cursor.drag { border-color: var(--fg); }

<body class="light">
  <canvas id="c"></canvas>
  <div id="toggle" title="Toggle theme"></div>
  <div id="cursor"></div>
<script src="../typography/core/ui.js"></script>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const dpr = Math.min(devicePixelRatio || 1, 2);
const cursor = document.getElementById('cursor');
const readout = { set innerHTML(v){}, set textContent(v){} };
const ui = PT.ui({ title: 'Proxy manipulation', hints: 'Hover small object · Drag proxy to move · Scroll proxy size · R reset', theme: 'light' });
const toggle = document.getElementById('toggle');
toggle.addEventListener('click', () => { const dark = document.body.classList.toggle('dark'); document.body.classList.toggle('light', !dark); ui.theme(dark ? 'dark' : 'light'); });

// state BEFORE resize
let W = 0, H = 0;
let seed = 707070;
let shapes = [];
let initial = [];
let mx = -100, my = -100;
let hoverShape = null;
let proxyTarget = null; // shape that the proxy represents
let drag = null; // { id, lastMx, lastMy } - in proxy mode
let proxySize = 32;
let proxyOffset = { x: 24, y: -32 }; // proxy appears offset from cursor

// Thresholds
const SMALL_THRESHOLD = 14; // shapes below this size trigger proxy
const FAR_THRESHOLD = 160; // cursor farther than this from the nearest shape triggers far mode
// Actually, our rule is: small shapes get proxy on hover (via their capture area)

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  C.width = W * dpr; C.height = H * dpr;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
  layout();
}
function layout() { if (shapes.length === 0) build(); }
resize();
window.addEventListener('resize', resize);

function mulberry32(s) { return function() { let t = (s += 0x6D2B79F5); t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function build() {
  const rng = mulberry32(seed);
  shapes = [];
  initial = [];
  // Mix of sizes: some tiny (3-10px), some small (12-18), some medium (30-50)
  const sizeClasses = [
    { min: 3, max: 7, count: 5 },    // tiny
    { min: 10, max: 16, count: 4 },  // small
    { min: 30, max: 50, count: 5 },  // normal
  ];
  let attempts = 0;
  for (const cls of sizeClasses) {
    let placed = 0;
    while (placed < cls.count && attempts < 3000) {
      attempts++;
      const x = 0.1 + rng() * 0.8;
      const y = 0.18 + rng() * 0.64;
      const size = cls.min + rng() * (cls.max - cls.min);
      let ok = true;
      for (const o of shapes) {
        if (Math.hypot((x - o.nx) * W, (y - o.ny) * H) < size + o.size + 16) { ok = false; break; }
      }
      if (ok) {
        const s = {
          id: shapes.length + 1,
          nx: x, ny: y,
          x: x * W, y: y * H,
          size,
        };
        shapes.push(s);
        initial.push({ id: s.id, x: s.x, y: s.y });
        placed++;
      }
    }
  }
}


function drawShape(s) {
  // The proxy target (and any dragged shape) is the one charged element - fill it accent.
  const charged = (proxyTarget && proxyTarget.id === s.id) || (drag && drag.id === s.id);
  X.save();
  X.beginPath(); X.arc(s.x, s.y, s.size, 0, Math.PI * 2);
  if (charged) {
    X.fillStyle = '#FBF251'; X.fill();
  } else {
    X.fillStyle = getComputedStyle(document.body).getPropertyValue('--obj'); X.fill();
  }
  X.restore();
}

function needsProxy(s) {
  return s.size < SMALL_THRESHOLD;
}

function captureRadius(s) {
  // Hit radius is enlarged for tiny shapes to make them easier to find
  return Math.max(s.size + 12, 22);
}

function drawCaptureBubble(s) {
  X.save();
  X.strokeStyle = getComputedStyle(document.body).getPropertyValue('--fg-dim');
  X.globalAlpha = 0.35;
  X.lineWidth = 1;
  X.setLineDash([2, 3]);
  X.beginPath(); X.arc(s.x, s.y, captureRadius(s), 0, Math.PI * 2); X.stroke();
  X.restore();
}

function drawProxy() {
  if (!proxyTarget) return;
  const t = proxyTarget;
  const px = mx + proxyOffset.x;
  const py = my + proxyOffset.y;
  const dim = getComputedStyle(document.body).getPropertyValue('--fg-dim');
  const light = document.body.classList.contains('light');
  // Connector line from proxy to target
  X.save();
  X.strokeStyle = dim;
  X.globalAlpha = 0.6;
  X.lineWidth = 1;
  X.setLineDash([2, 3]);
  X.beginPath(); X.moveTo(t.x, t.y); X.lineTo(px, py); X.stroke();
  X.restore();
  // Proxy: enlarged preview of the target - the charged handle, filled accent
  X.save();
  X.fillStyle = '#FBF251';
  X.beginPath(); X.arc(px, py, proxySize / 2, 0, Math.PI * 2); X.fill();
  // Halo
  X.strokeStyle = dim;
  X.globalAlpha = 0.9;
  X.lineWidth = 1.5;
  X.beginPath(); X.arc(px, py, proxySize / 2 + 3, 0, Math.PI * 2); X.stroke();
  X.restore();
  // Label
  X.save();
  X.font = '9px "IBM Plex Mono", monospace';
  X.fillStyle = dim;
  X.textAlign = 'center';
  X.textBaseline = 'top';
  X.fillText(`S${t.id} · ${t.size.toFixed(0)}px`, px, py + proxySize / 2 + 8);
  X.restore();
  // Mini indicator on target
  X.save();
  X.strokeStyle = dim;
  X.lineWidth = 1.5;
  X.globalAlpha = 0.85;
  X.beginPath(); X.arc(t.x, t.y, t.size + 3, 0, Math.PI * 2); X.stroke();
  X.restore();
}

function draw() {
  X.clearRect(0, 0, W, H);
  // Shapes
  for (const s of shapes) {
    drawShape(s);
    if (needsProxy(s) && (hoverShape?.id === s.id || proxyTarget?.id === s.id)) {
      drawCaptureBubble(s);
    }
  }
  // Regular hover (non-proxy shapes)
  if (hoverShape && !needsProxy(hoverShape) && !drag) {
    X.save();
    X.strokeStyle = getComputedStyle(document.body).getPropertyValue('--fg-dim');
    X.lineWidth = 1;
    X.setLineDash([3, 3]);
    X.beginPath(); X.arc(hoverShape.x, hoverShape.y, hoverShape.size + 6, 0, Math.PI * 2); X.stroke();
    X.restore();
  }
  drawProxy();
  // Chrome
  const smallCount = shapes.filter(s => needsProxy(s)).length;
  readout.innerHTML = `Objects <b>${shapes.length}</b> · Small <b>${smallCount}</b>${proxyTarget ? ` · Proxy <b>S${proxyTarget.id}</b>` : ''}`;
}

function loop() { draw(); requestAnimationFrame(loop); }
loop();

function findProxyTarget(x, y) {
  // Find small shape with enlarged capture radius, closest one
  let best = null, bestD = Infinity;
  for (const s of shapes) {
    if (!needsProxy(s)) continue;
    const d = Math.hypot(x - s.x, y - s.y);
    if (d < captureRadius(s) && d < bestD) {
      bestD = d;
      best = s;
    }
  }
  return best;
}
function hitNormalShape(x, y) {
  // For non-small shapes only
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    if (needsProxy(s)) continue;
    if (Math.hypot(x - s.x, y - s.y) < s.size + 4) return s;
  }
  return null;
}

window.addEventListener('pointermove', e => {
  const oldMx = mx, oldMy = my;
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  if (drag) {
    // During proxy drag, move the shape by (dx, dy) from previous cursor position
    const s = shapes.find(x => x.id === drag.id);
    if (s) {
      s.x += mx - oldMx;
      s.y += my - oldMy;
    }
    cursor.classList.add('drag');
    return;
  }
  const proxy = findProxyTarget(mx, my);
  if (proxy) {
    proxyTarget = proxy;
    hoverShape = proxy;
    cursor.classList.add('proxy');
    cursor.classList.remove('drag');
  } else {
    proxyTarget = null;
    cursor.classList.remove('proxy');
    hoverShape = hitNormalShape(mx, my);
  }
});
window.addEventListener('pointerdown', e => {
  if (proxyTarget) {
    drag = { id: proxyTarget.id };
    cursor.classList.add('drag');
    return;
  }
  // normal click on a normal-sized shape
  const h = hitNormalShape(e.clientX, e.clientY);
  if (h) {
    drag = { id: h.id, offX: e.clientX - h.x, offY: e.clientY - h.y, normal: true };
    cursor.classList.add('drag');
  }
});
window.addEventListener('pointermove', e => {
  if (drag && drag.normal) {
    const s = shapes.find(x => x.id === drag.id);
    if (s) { s.x = e.clientX - drag.offX; s.y = e.clientY - drag.offY; }
  }
});
window.addEventListener('pointerup', () => {
  drag = null;
  cursor.classList.remove('drag');
});
window.addEventListener('wheel', e => {
  if (proxyTarget) {
    proxySize = clamp(proxySize - Math.sign(e.deltaY) * 4, 16, 80);
    e.preventDefault();
  }
}, { passive: false });
window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    for (const p of initial) {
      const s = shapes.find(x => x.id === p.id);
      if (s) { s.x = p.x; s.y = p.y; }
    }
  }
});
</script>
</body>
</html>
