<style>
:root {
  /* UI neutrals - the interface is monochrome: proper white / grey / black */
  --c-white: #FAFAFA;
  --c-grey:  #8A8A8A;
  --c-black: #0A0A0A;

  /* Light is the default theme; add `dark` on <body> for the option. */
  --bg: var(--c-white);
  --doc: #EDEDEF;
  --fg: rgba(10,10,10,0.95);
  --dim: rgba(10,10,10,0.16);
  --mid: rgba(10,10,10,0.28);
  --active: rgba(10,10,10,0.55);
  --hover: rgba(10,10,10,0.80);
  --obj: rgb(98,103,113);   /* card content marks: theme-aware neutral fill */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
body.dark {
  --bg: var(--c-black);
  --doc: #131317;
  --fg: rgba(250,250,250,0.95);
  --dim: rgba(250,250,250,0.16);
  --mid: rgba(250,250,250,0.28);
  --active: rgba(250,250,250,0.55);
  --hover: rgba(250,250,250,0.80);
  --obj: rgb(132,137,148);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; cursor: none; transition: background 0.4s var(--ease); touch-action: none; overscroll-behavior: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

#c { position: fixed; inset: 0; z-index: 1; }

/* Theme toggle: the same glass as the floating legend, but circular, with a
   small solid white/black dot in the centre (the dot follows the theme). */
#toggle{position:fixed;bottom:14px;right:16px;z-index:9998;width:30px;height:30px;border-radius:50%;cursor:pointer;pointer-events:auto;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.06);display:grid;place-items:center;transition:transform .2s var(--ease);}
body.dark #toggle{background:rgba(10,10,10,.35);border-color:rgba(255,255,255,.08);}
#toggle::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--fg);}
#toggle:hover{transform:scale(1.08);}

/* Cursor */
.cursor { position: fixed; z-index: 50; pointer-events: none; width: 28px; height: 28px; transform: translate(-50%, -50%); }
.cursor .ring { position: absolute; inset: 0; border: 1px solid var(--c-grey); border-radius: 50%; transition: border-color 0.25s var(--ease), transform 0.25s var(--ease); }
.cursor .cross { position: absolute; left: 50%; top: 50%; background: var(--c-grey); transform: translate(-50%, -50%); transition: background 0.25s var(--ease); }
.cursor .cross.h { width: 10px; height: 1px; }
.cursor .cross.v { width: 1px; height: 10px; }
body.hovering .cursor .ring { border-color: var(--fg); transform: scale(1.25); }
body.dragging .cursor .ring { border-color: var(--fg); transform: scale(1.5); border-style: dashed; }
body.dragging .cursor .cross { background: var(--fg); }

/* Touch devices: the finger is the pointer, so no custom crosshair. */

<script>
const C = document.getElementById('c');
const X = C.getContext('2d', { alpha: false });
let W = 0, H = 0;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

const HINTS = 'Scroll to zoom · Zoom in for detail, out for summary · Drag to pan · Double-click an element to zoom to it · R reset';
const ui = PT.ui({ title: 'Zoom', hints: HINTS, theme: 'light' });

// The bottom legend doubles as a stage-reflective status bar: idle shows the how-to,
// then panning / zooming swap in the live zoom level + tier, and a zoom-to flashes
// then reverts. We reuse the panel's own glass pill + segment classes so it stays native.
const pill = document.querySelector('.adui-pill');
const seg = (html) => '<span class="adui-seg">' + html + '</span>';
const key = (t) => '<b class="adui-key">' + t + '</b>';
let lastBar = '';
function setBar(html) { if (pill && html !== lastBar) { pill.innerHTML = html; lastBar = html; } }
function idleBar() { lastBar = ''; ui.setHints(HINTS); }
let flashUntil = 0;                 // committed messages hold the bar until this timestamp
function flashBar(html, ms) { setBar(html); flashUntil = performance.now() + ms; }
let zoomBarUntil = 0;               // a recent wheel keeps the zoom readout up briefly

// ───── World geometry (fixed, screen-independent) ─────
const EL_W = 320, EL_H = 250;        // element size in world units
const GAP_X = 150, GAP_Y = 160;      // gaps between cards, world units
const COLS = 4;
const PAD = 20;                      // inner card padding, world units

// Tier thresholds expressed as a ratio r = scale / homeScale (so they are
// screen-independent). Two thresholds per boundary give a cross-fade band that,
// combined with the eased weights below, removes any flicker at the edges.
const F0r = 0.46, F1r = 0.68;        // far  ↔ mid  band
const N0r = 1.18, N1r = 1.58;        // mid  ↔ near band

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ───── State (declared with defaults BEFORE the first resize() - no TDZ) ─────
let elements = [];
let worldW = 0, worldH = 0;

// Camera: a rendered pose (scale/pan) that eases toward a target pose. World→screen
// is  sx = wx*scale + panX. Zoom-to-cursor keeps the world point under the cursor fixed.
let scale = 1, panX = 0, panY = 0;
let tScale = 1, tPanX = 0, tPanY = 0;
let homeScale = 1, homePanX = 0, homePanY = 0;
let minScale = 0.3, maxScale = 3;
let framed = false;

// Eased global tier weights (all elements share a size, so one set drives them all).
let gFar = 0, gMid = 1, gNear = 0;

// Pointer bookkeeping (unified mouse / touch; two pointers = pinch).
const pointers = new Map();
let panning = false, pinching = false;
let panLastX = 0, panLastY = 0;
let pinchCx = 0, pinchCy = 0, pinchDist = 1;
let mouseX = -100, mouseY = -100;
let hoverId = -1;
let dnX = 0, dnY = 0, dnT = 0, dnHit = -1;   // primary-pointer down info, for tap detection
let lastTapT = 0, lastTapHit = -2;
const seed = 717171;

function resize() {
  // Preserve the world point currently at screen centre, so a resize never drifts the view.
  const had = framed && W > 0 && H > 0;
  let cwx = 0, cwy = 0;
  if (had) { cwx = (W / 2 - panX) / scale; cwy = (H / 2 - panY) / scale; }

  W = window.innerWidth; H = window.innerHeight;
  C.width = W * dpr; C.height = H * dpr;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
  layout();

  // The new viewport recomputes min/max/home scale; re-clamp the live pose so a
  // shrink can't leave scale outside the fresh bounds until the next zoom.
  scale = clamp(scale, minScale, maxScale);
  tScale = clamp(tScale, minScale, maxScale);

  if (had) {
    panX = W / 2 - cwx * scale; panY = H / 2 - cwy * scale;
    tPanX = W / 2 - cwx * tScale; tPanY = H / 2 - cwy * tScale;
  }
}
function layout() {
  // Fit the whole world into the viewport with a margin - this is the reset / home pose.
  const m = Math.max(30, Math.min(W, H) * 0.09);
  homeScale = Math.min((W - 2 * m) / worldW, (H - 2 * m) / worldH);
  homePanX = W / 2 - (worldW / 2) * homeScale;
  homePanY = H / 2 - (worldH / 2) * homeScale;
  minScale = homeScale * 0.30;
  maxScale = homeScale * 2.9;
  if (!framed) {
    scale = tScale = homeScale;
    panX = tPanX = homePanX;
    panY = tPanY = homePanY;
    framed = true;
  }
}

function mulberry32(s) {
  return function() {
    let t = (s += 0x6D2B79F5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ───── Colour helpers (tints of a content accent for previews) ─────
function hexToRgb(h) { h = h.replace('#', ''); return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)]; }
function mixHex(hex, t) {                          // t>0 → toward white, t<0 → toward black
  const c = hexToRgb(hex), to = t > 0 ? 255 : 0, k = Math.abs(t);
  return 'rgb(' + Math.round(c[0] + (to - c[0]) * k) + ',' + Math.round(c[1] + (to - c[1]) * k) + ',' + Math.round(c[2] + (to - c[2]) * k) + ')';
}

// ───── Content (real-ish cards; each has three representation tiers) ─────
const CONTENT = [
  { title: 'Signups',   stat: '4,182', unit: '/wk',    prev: 'bars',     body: 'Weekly account creations across every region, trailing thirty days.' },
  { title: 'Latency',   stat: '128',   unit: 'ms',     prev: 'line',     body: 'Median request time at the edge; the p95 tail sits near four hundred.' },
  { title: 'Revenue',   stat: '$92k',  unit: 'MRR',    prev: 'donut',    body: 'Recurring monthly revenue, split across plan tiers and billing cycles.' },
  { title: 'Palette',   stat: '6',     unit: 'tones',  prev: 'swatches', body: 'The working colour set for the current brand-system exploration.' },
  { title: 'Sessions',  stat: '18.4k', unit: 'today',  prev: 'bars',     body: 'Active sessions rolling through the app over the last full day.' },
  { title: 'Retention', stat: '71%',   unit: 'D30',    prev: 'line',     body: 'Share of the cohort still active thirty days after their first open.' },
  { title: 'Storage',   stat: '2.3TB', unit: 'used',   prev: 'donut',    body: 'Object storage consumed against the currently provisioned quota.' },
  { title: 'Reach',     stat: '1.2M',  unit: 'people', prev: 'swatches', body: 'Unique people touched by the latest campaign flight this quarter.' },
  { title: 'Errors',    stat: '0.4%',  unit: 'rate',   prev: 'line',     body: 'Fraction of requests returning a server error over the last hour.' },
  { title: 'Nodes',     stat: '48',    unit: 'live',   prev: 'bars',     body: 'Compute nodes currently serving production traffic in the cluster.' },
];

// Wrap body text to a world-unit width, capped to a few lines (measured once, not per frame).
function wrapBody(text, maxW, maxLines) {
  X.font = fontSans(13, 400);
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (let i = 0; i < words.length; i++) {
    const test = cur ? cur + ' ' + words[i] : words[i];
    if (X.measureText(test).width > maxW && cur) {
      lines.push(cur); cur = words[i];
      if (lines.length === maxLines - 1) break;
    } else cur = test;
  }
  if (cur && lines.length < maxLines) lines.push(cur);
  if (lines.length === maxLines) {
    // ellipsize the final line if content remains
    let last = lines[maxLines - 1];
    while (X.measureText(last + '…').width > maxW && last.length > 1) last = last.slice(0, -1);
    lines[maxLines - 1] = last + '…';
  }
  return lines;
}

function regen() {
  const rng = mulberry32(seed);
  elements = [];
  const rows = Math.ceil(CONTENT.length / COLS);
  for (let i = 0; i < CONTENT.length; i++) {
    const c = CONTENT[i];
    const col = i % COLS, row = Math.floor(i / COLS);
    // A loose grid with deterministic jitter so the field reads as a canvas, not a table.
    const jx = (rng() - 0.5) * GAP_X * 0.5;
    const jy = (rng() - 0.5) * GAP_Y * 0.5;
    const wx = col * (EL_W + GAP_X) + jx;
    const wy = row * (EL_H + GAP_Y) + jy;

    // Deterministic preview data per element.
    let data;
    if (c.prev === 'bars')       { data = Array.from({ length: 7 }, () => 0.18 + rng() * 0.82); }
    else if (c.prev === 'line')  { data = Array.from({ length: 12 }, () => 0.2 + rng() * 0.7); }
    else if (c.prev === 'donut') { const a = 0.25 + rng() * 0.3, b = 0.2 + rng() * 0.25; data = [a, b, Math.max(0.12, 1 - a - b)]; }
    else                         { data = Array.from({ length: 6 }, (_, k) => -0.32 + k * 0.14); } // swatch tint steps

    elements.push({
      id: i, wx, wy, ww: EL_W, wh: EL_H,
      title: c.title, stat: c.stat, unit: c.unit, prev: c.prev, data,
      lines: wrapBody(c.body, EL_W - 2 * PAD, 3),
    });
  }
  // World bounds from the placed extents (+ a little breathing room).
  let maxX = 0, maxY = 0;
  for (const e of elements) { maxX = Math.max(maxX, e.wx + e.ww); maxY = Math.max(maxY, e.wy + e.wh); }
  worldW = maxX; worldH = maxY;
}

// ───── Theme colours (cached; custom props don't transition, re-read only on toggle) ─────
let COL = {}, isDark = false;
function readTheme() {
  const cs = getComputedStyle(document.body);
  isDark = document.body.classList.contains('dark');
  COL = {
    bg:     cs.getPropertyValue('--bg').trim(),
    doc:    cs.getPropertyValue('--doc').trim(),
    fg:     cs.getPropertyValue('--fg').trim(),
    dim:    cs.getPropertyValue('--dim').trim(),
    mid:    cs.getPropertyValue('--mid').trim(),
    active: cs.getPropertyValue('--active').trim(),
    obj:    cs.getPropertyValue('--obj').trim(),
    // Opaque grey hex base for chart tints (mixHex needs a hex): the --obj neutral
    // flattened over the card, so tonal steps still read on both themes.
    objHex:      isDark ? '#A0A0A0' : '#616161',
    card:        isDark ? '#1C1C22' : '#FFFFFF',
    cardBorder:  isDark ? 'rgba(255,255,255,0.09)' : 'rgba(10,10,10,0.08)',
    track:       isDark ? 'rgba(255,255,255,0.12)' : 'rgba(10,10,10,0.10)',
  };
}

// ───── Fonts (sized per draw against the live scale) ─────
const fontMono = (px, w) => (w || 400) + ' ' + px + 'px "IBM Plex Mono", monospace';
const fontSans = (px, w) => (w || 400) + ' ' + px + 'px "DM Sans", sans-serif';

// ───── Tier weights from the zoom ratio (cross-fade bands) ─────
function tierWeights(r) {
  if (r <= F0r) return [1, 0, 0];
  if (r < F1r)  { const t = (r - F0r) / (F1r - F0r); return [1 - t, t, 0]; }
  if (r <= N0r) return [0, 1, 0];
  if (r < N1r)  { const t = (r - N0r) / (N1r - N0r); return [0, 1 - t, t]; }
  return [0, 0, 1];
}
function tierName(r) { return r <= F1r ? 'Survey' : (r >= N0r ? 'Detail' : 'Summary'); }

// ───── Card + preview rendering (all in screen coords; fonts scale with the camera) ─────
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w * 0.5, h * 0.5);
  X.beginPath();
  X.moveTo(x + r, y);
  X.arcTo(x + w, y, x + w, y + h, r);
  X.arcTo(x + w, y + h, x, y + h, r);
  X.arcTo(x, y + h, x, y, r);
  X.arcTo(x, y, x + w, y, r);
  X.closePath();
}

function drawCard(sx, sy, sw, sh, a) {
  const rad = 14 * scale;
  // Hand-drawn soft drop shadow: a few stacked, growing, fading dark copies (never ctx.filter).
  X.save();
  const layers = 4, off = Math.max(2, 6 * scale);
  for (let i = layers; i >= 1; i--) {
    const f = i / layers;
    X.globalAlpha = a * 0.05 * f;
    X.fillStyle = '#000';
    const g = off * i * 0.6;
    roundRect(sx - g * 0.4, sy + off * 0.5 + g * 0.4, sw + g * 0.8, sh + g * 0.8, rad + g);
    X.fill();
  }
  X.restore();
  X.save();
  X.globalAlpha = a;
  X.fillStyle = COL.card;
  roundRect(sx, sy, sw, sh, rad);
  X.fill();
  X.globalAlpha = a;
  X.lineWidth = 1;
  X.strokeStyle = COL.cardBorder;
  roundRect(sx + 0.5, sy + 0.5, sw - 1, sh - 1, rad);
  X.stroke();
  X.restore();
}

function drawFar(e, sx, sy, sw, sh, a) {
  // Just enough to locate it: a coloured dot + its title to the right.
  const cx = sx + sw * 0.5, cy = sy + sh * 0.5;
  const rr = clamp(sw * 0.05, 3, 9);
  X.save();
  X.globalAlpha = a;
  X.fillStyle = COL.obj;
  X.beginPath(); X.arc(cx, cy, rr, 0, Math.PI * 2); X.fill();
  X.globalAlpha = a * 0.9;
  X.fillStyle = COL.active;
  X.font = fontMono(clamp(sw * 0.055, 9, 14), 400);
  X.textAlign = 'left'; X.textBaseline = 'middle';
  X.fillText(e.title, cx + rr + 6, cy + 0.5);
  X.restore();
}

function drawMid(e, sx, sy, sw, sh, a) {
  // Summary card: title + the one key stat.
  X.save();
  X.globalAlpha = a;
  X.textAlign = 'left'; X.textBaseline = 'alphabetic';
  X.fillStyle = COL.obj;
  X.beginPath(); X.arc(sx + PAD * scale + 3 * scale, sy + PAD * scale + 3 * scale, 3.5 * scale, 0, Math.PI * 2); X.fill();
  X.fillStyle = COL.active;
  X.font = fontMono(13 * scale, 500);
  X.fillText(e.title, sx + (PAD + 14) * scale, sy + (PAD + 8) * scale);
  X.fillStyle = COL.fg;
  X.font = fontMono(44 * scale, 500);
  X.fillText(e.stat, sx + PAD * scale, sy + sh * 0.62);
  const sw2 = X.measureText(e.stat).width;
  X.fillStyle = COL.mid;
  X.font = fontMono(14 * scale, 400);
  X.fillText(e.unit, sx + PAD * scale + sw2 + 8 * scale, sy + sh * 0.62);
  // A faint sparkline of the key metric across the card foot - a hint of the detail below.
  drawMiniSpark(e, sx + PAD * scale, sy + sh - PAD * scale - 14 * scale, sw - 2 * PAD * scale, 12 * scale, a * 0.55);
  X.restore();
}

function drawMiniSpark(e, x, y, w, h, a) {
  X.save();
  X.globalAlpha = a;
  X.strokeStyle = COL.obj; X.lineWidth = Math.max(1, 1.4 * scale);
  X.beginPath();
  const n = 12;
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const v = 0.5 + 0.42 * Math.sin(i * 1.3 + e.id) * (0.6 + 0.4 * ((e.id * 7 + i) % 5) / 5);
    const px = x + t * w, py = y + h - v * h;
    i ? X.lineTo(px, py) : X.moveTo(px, py);
  }
  X.stroke();
  X.restore();
}

function drawPreview(e, x, y, w, h) {
  const col = COL.objHex;   // grey base; mixHex tints it to keep chart tonal steps legible
  if (e.prev === 'bars') {
    const n = e.data.length, bw = w / n * 0.62, sp = w / n;
    for (let i = 0; i < n; i++) {
      const bh = e.data[i] * h;
      X.fillStyle = mixHex(col, i / n * 0.3 - 0.05);
      X.fillRect(x + i * sp + (sp - bw) / 2, y + h - bh, bw, bh);
    }
  } else if (e.prev === 'line') {
    const n = e.data.length;
    X.strokeStyle = col; X.lineWidth = Math.max(1.2, 2 * scale);
    X.beginPath();
    for (let i = 0; i < n; i++) {
      const px = x + (i / (n - 1)) * w, py = y + h - e.data[i] * h;
      i ? X.lineTo(px, py) : X.moveTo(px, py);
    }
    X.stroke();
    // area fill under the line
    X.lineTo(x + w, y + h); X.lineTo(x, y + h); X.closePath();
    X.globalAlpha *= 0.16; X.fillStyle = col; X.fill(); X.globalAlpha /= 0.16;
  } else if (e.prev === 'donut') {
    const cx = x + h * 0.5, cy = y + h * 0.5, ro = h * 0.48, ri = h * 0.27;
    let a0 = -Math.PI / 2;
    for (let i = 0; i < e.data.length; i++) {
      const a1 = a0 + e.data[i] * Math.PI * 2;
      X.beginPath();
      X.arc(cx, cy, ro, a0, a1); X.arc(cx, cy, ri, a1, a0, true); X.closePath();
      X.fillStyle = mixHex(col, 0.28 - i * 0.24);
      X.fill();
      a0 = a1;
    }
    // legend chips to the right
    let ly = y + 2 * scale;
    X.textAlign = 'left'; X.textBaseline = 'top';
    X.font = fontMono(9 * scale, 400);
    const labs = ['a', 'b', 'c'];
    for (let i = 0; i < e.data.length; i++) {
      X.fillStyle = mixHex(col, 0.28 - i * 0.24);
      X.fillRect(x + h + 10 * scale, ly + 1 * scale, 7 * scale, 7 * scale);
      X.fillStyle = COL.mid;
      X.fillText(labs[i] + '  ' + Math.round(e.data[i] * 100) + '%', x + h + 22 * scale, ly);
      ly += 13 * scale;
    }
  } else { // swatches
    const n = e.data.length, sw2 = w / n * 0.82, sp = w / n;
    for (let i = 0; i < n; i++) {
      X.fillStyle = mixHex(col, e.data[i]);
      roundRect(x + i * sp, y + h * 0.2, sw2, h * 0.6, 3 * scale); X.fill();
    }
  }
}

function drawControls(e, x, y) {
  // Two inert mini-controls - a toggle and a slider - to make the detail tier read as workable.
  X.save();
  // toggle pill
  const tw = 30 * scale, th = 16 * scale;
  X.globalAlpha = 1;
  X.fillStyle = COL.obj;
  roundRect(x, y, tw, th, th * 0.5); X.fill();
  X.fillStyle = '#fff';
  X.beginPath(); X.arc(x + tw - th * 0.5, y + th * 0.5, th * 0.36, 0, Math.PI * 2); X.fill();
  X.fillStyle = COL.mid; X.font = fontMono(10 * scale, 400);
  X.textAlign = 'left'; X.textBaseline = 'middle';
  X.fillText('Live', x + tw + 8 * scale, y + th * 0.5 + 0.5 * scale);
  // slider
  const slx = x + tw + 46 * scale, slw = 78 * scale, sy2 = y + th * 0.5;
  X.strokeStyle = COL.track; X.lineWidth = Math.max(1.5, 3 * scale);
  X.beginPath(); X.moveTo(slx, sy2); X.lineTo(slx + slw, sy2); X.stroke();
  X.strokeStyle = COL.obj;
  X.beginPath(); X.moveTo(slx, sy2); X.lineTo(slx + slw * 0.62, sy2); X.stroke();
  X.fillStyle = COL.obj;
  X.beginPath(); X.arc(slx + slw * 0.62, sy2, 5 * scale, 0, Math.PI * 2); X.fill();
  X.restore();
}

function drawNear(e, sx, sy, sw, sh, a) {
  // Full detail: title, stat, body, the mini preview, and a couple of inert controls.
  X.save();
  X.globalAlpha = a;
  X.textAlign = 'left'; X.textBaseline = 'alphabetic';
  const px = sx + PAD * scale;
  // header row: dot + title (left), unit tag (right)
  X.fillStyle = COL.obj;
  X.beginPath(); X.arc(px + 4 * scale, sy + PAD * scale + 4 * scale, 4 * scale, 0, Math.PI * 2); X.fill();
  X.fillStyle = COL.fg;
  X.font = fontSans(17 * scale, 600);
  X.fillText(e.title, px + 16 * scale, sy + (PAD + 12) * scale);
  X.fillStyle = COL.mid;
  X.font = fontMono(11 * scale, 400);
  X.textAlign = 'right';
  X.fillText(e.unit, sx + sw - PAD * scale, sy + (PAD + 10) * scale);
  X.textAlign = 'left';
  // big stat
  X.fillStyle = COL.fg;
  X.font = fontMono(38 * scale, 500);
  X.fillText(e.stat, px, sy + (PAD + 58) * scale);
  // body lines
  X.fillStyle = COL.active;
  X.font = fontSans(13 * scale, 400);
  for (let i = 0; i < e.lines.length; i++) {
    X.fillText(e.lines[i], px, sy + (PAD + 92 + i * 17) * scale);
  }
  // preview
  drawPreview(e, px, sy + sh - (PAD + 78) * scale, sw - 2 * PAD * scale, 44 * scale);
  // controls
  drawControls(e, px, sy + sh - (PAD + 16) * scale);
  X.restore();
}

// ───── The world grid (spatial context for pan / zoom) ─────
function drawGrid() {
  const gw = 190;
  X.save();
  X.strokeStyle = COL.dim; X.globalAlpha = 0.5; X.lineWidth = 1;
  X.beginPath();
  const x0 = -200, x1 = worldW + 200, y0 = -200, y1 = worldH + 200;
  for (let wx = Math.ceil(x0 / gw) * gw; wx <= x1; wx += gw) {
    const sx = wx * scale + panX;
    if (sx < -2 || sx > W + 2) continue;
    X.moveTo(sx, Math.max(0, y0 * scale + panY)); X.lineTo(sx, Math.min(H, y1 * scale + panY));
  }
  for (let wy = Math.ceil(y0 / gw) * gw; wy <= y1; wy += gw) {
    const sy = wy * scale + panY;
    if (sy < -2 || sy > H + 2) continue;
    X.moveTo(Math.max(0, x0 * scale + panX), sy); X.lineTo(Math.min(W, x1 * scale + panX), sy);
  }
  X.stroke();
  X.restore();
}

// ───── Frame ─────
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  // Ease the camera toward its target pose (a smooth exponential approach).
  const k = 1 - Math.exp(-dt * 15);
  scale += (tScale - scale) * k;
  panX  += (tPanX - panX) * k;
  panY  += (tPanY - panY) * k;
  if (Math.abs(tScale - scale) < 1e-4) scale = tScale;

  // Ease the tier weights toward the current zoom ratio (the anti-flicker damping).
  const r = scale / homeScale;
  const tw = tierWeights(r);
  const wk = 1 - Math.exp(-dt * 13);
  gFar  += (tw[0] - gFar)  * wk;
  gMid  += (tw[1] - gMid)  * wk;
  gNear += (tw[2] - gNear) * wk;

  // Status bar: a committed flash holds, else pan / zoom readouts, else idle.
  const pct = Math.round(r * 100);
  if (now >= flashUntil) {
    if (panning || pinching) {
      setBar(seg(key(pinching ? 'Pinch' : 'Pan')) + seg('Zoom ' + pct + '%') + seg(tierName(r)));
    } else if (now < zoomBarUntil) {
      setBar(seg(key('Zoom') + ' ' + pct + '%') + seg(tierName(r)) + seg(r >= N0r ? 'Full detail' : r <= F1r ? 'Survey' : 'Summary'));
    } else if (lastBar !== '') {
      idleBar();
    }
  }

  // Draw. Background repaints every frame (alpha:false context).
  X.fillStyle = COL.bg;
  X.fillRect(0, 0, W, H);
  drawGrid();

  for (const e of elements) {
    const sx = e.wx * scale + panX, sy = e.wy * scale + panY;
    const sw = e.ww * scale, sh = e.wh * scale;
    if (sx + sw < -30 || sy + sh < -30 || sx > W + 30 || sy > H + 30) continue; // cull off-screen

    const cardA = Math.min(1, gMid + gNear);
    if (cardA > 0.01) drawCard(sx, sy, sw, sh, cardA);
    if (gFar  > 0.01) drawFar(e, sx, sy, sw, sh, gFar);
    if (gMid  > 0.01) drawMid(e, sx, sy, sw, sh, gMid);
    if (gNear > 0.01) drawNear(e, sx, sy, sw, sh, gNear);

    // Hover / focus outline (neutral value contrast) once the card is legible.
    if (e.id === hoverId && cardA > 0.2 && !panning && !pinching) {
      X.save();
      X.globalAlpha = cardA;
      X.strokeStyle = COL.fg; X.lineWidth = 1.5;
      roundRect(sx - 1.5, sy - 1.5, sw + 3, sh + 3, 15 * scale);
      X.stroke();
      X.restore();
    }
  }

  requestAnimationFrame(frame);
}

// ───── Hit testing ─────
function hitTest(px, py) {
  for (let i = elements.length - 1; i >= 0; i--) {
    const e = elements[i];
    const sx = e.wx * scale + panX, sy = e.wy * scale + panY;
    const sw = e.ww * scale, sh = e.wh * scale;
    if (px >= sx && px <= sx + sw && py >= sy && py <= sy + sh) return e.id;
  }
  return -1;
}

// ───── Camera moves ─────
function setCamImmediate() { tScale = scale; tPanX = panX; tPanY = panY; }

function zoomAt(cx, cy, factor) {
  // Zoom-to-cursor against the TARGET pose so repeated scrolls compound cleanly.
  const ns = clamp(tScale * factor, minScale, maxScale);
  const wx = (cx - tPanX) / tScale, wy = (cy - tPanY) / tScale;
  tScale = ns;
  tPanX = cx - wx * ns;
  tPanY = cy - wy * ns;
}

function zoomToElement(id) {
  const e = elements.find(el => el.id === id);
  if (!e) return;
  // Ease the camera so the element fills a comfortable detail size (well inside the near tier).
  const want = Math.min(W, H) * 0.62 / EL_H;
  tScale = clamp(Math.max(want, homeScale * 1.95), minScale, maxScale);
  const cwx = e.wx + e.ww / 2, cwy = e.wy + e.wh / 2;
  tPanX = W / 2 - cwx * tScale;
  tPanY = H / 2 - cwy * tScale;
  flashBar(seg(key('Zoomed to') + ' ' + e.title) + seg('Detail view'), 1500);
}

function doReset() {
  tScale = homeScale; tPanX = homePanX; tPanY = homePanY;
  flashUntil = 0;
  flashBar(seg(key('Reset')) + seg('Fit to survey'), 1100);
}

// ───── Input ─────
const cursor = document.getElementById('cursor');
const toggle = document.getElementById('toggle');

function centroidOfPointers() {
  let sx = 0, sy = 0;
  for (const p of pointers.values()) { sx += p.x; sy += p.y; }
  const n = pointers.size;
  return { x: sx / n, y: sy / n };
}
function distOfPointers() {
  const it = pointers.values();
  const a = it.next().value, b = it.next().value;
  return Math.hypot(a.x - b.x, a.y - b.y) || 1;
}

C.addEventListener('wheel', (e) => {
  if (e.target.closest('#toggle, .adui')) return;
  e.preventDefault();
  const f = Math.exp(-e.deltaY * (e.deltaMode === 1 ? 0.06 : 0.0016));
  zoomAt(e.clientX, e.clientY, f);
  zoomBarUntil = performance.now() + 950;
  flashUntil = 0;
}, { passive: false });

window.addEventListener('pointermove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top  = mouseY + 'px';

  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pinching && pointers.size >= 2) {
    const c = centroidOfPointers(), d = distOfPointers();
    // pan by centroid drift, then zoom about the centroid - finger-tracking (no ease).
    const dcx = c.x - pinchCx, dcy = c.y - pinchCy;
    panX += dcx; panY += dcy;
    const f = d / pinchDist;
    const ns = clamp(scale * f, minScale, maxScale);
    const wx = (c.x - panX) / scale, wy = (c.y - panY) / scale;
    scale = ns; panX = c.x - wx * ns; panY = c.y - wy * ns;
    setCamImmediate();
    pinchCx = c.x; pinchCy = c.y; pinchDist = d;
    return;
  }

  if (panning && pointers.size === 1) {
    const dx = e.clientX - panLastX, dy = e.clientY - panLastY;
    panX += dx; panY += dy; setCamImmediate();
    panLastX = e.clientX; panLastY = e.clientY;
    return;
  }

  // idle: hover feedback
  const h = hitTest(mouseX, mouseY);
  hoverId = h;
  document.body.classList.toggle('hovering', h !== -1);
});

window.addEventListener('pointerdown', (e) => {
  if (e.target.closest('#toggle, .adui')) return;
  if (e.button !== undefined && e.button > 0) return;
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px'; cursor.style.top = mouseY + 'px';
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  try { C.setPointerCapture(e.pointerId); } catch (_) {}
  flashUntil = 0;

  if (pointers.size === 1) {
    panning = true; pinching = false;
    panLastX = e.clientX; panLastY = e.clientY;
    dnX = e.clientX; dnY = e.clientY; dnT = performance.now();
    dnHit = hitTest(e.clientX, e.clientY);
    document.body.classList.add('dragging');
  } else if (pointers.size === 2) {
    panning = false; pinching = true;
    const c = centroidOfPointers();
    pinchCx = c.x; pinchCy = c.y; pinchDist = distOfPointers();
    document.body.classList.add('dragging');
  }
});

function onPointerEnd(e) {
  if (!pointers.has(e.pointerId)) return;
  pointers.delete(e.pointerId);

  if (pointers.size === 1) {
    // one finger lifted from a pinch - fall back to panning with the survivor
    pinching = false; panning = true;
    const p = pointers.values().next().value;
    panLastX = p.x; panLastY = p.y;
    return;
  }
  if (pointers.size >= 2) return;

  // last pointer up
  const wasPinch = pinching;
  panning = false; pinching = false;
  document.body.classList.remove('dragging');

  if (!wasPinch) {
    // Tap vs double-tap (drag is excluded by the movement threshold).
    const moved = Math.hypot(e.clientX - dnX, e.clientY - dnY);
    const dur = performance.now() - dnT;
    if (moved < 8 && dur < 320) {
      const now = performance.now();
      const isDouble = (now - lastTapT) < 340 && lastTapHit === dnHit;
      if (isDouble) {
        if (dnHit !== -1) zoomToElement(dnHit);
        else doReset();                    // double-tap empty space = reset (touch fallback for R)
        lastTapT = 0; lastTapHit = -2;
      } else {
        lastTapT = now; lastTapHit = dnHit;
      }
    }
  }
}
window.addEventListener('pointerup', onPointerEnd);
window.addEventListener('pointercancel', (e) => {
  if (!pointers.has(e.pointerId)) return;
  pointers.delete(e.pointerId);
  if (pointers.size === 1) {
    // one pointer cancelled mid-pinch - fall back to panning with the survivor
    pinching = false; panning = true;
    const p = pointers.values().next().value;
    panLastX = p.x; panLastY = p.y;
    return;
  }
  if (pointers.size === 0) { panning = false; pinching = false; document.body.classList.remove('dragging'); }
});

// Belt-and-braces: some browsers still fire dblclick for mouse - route it too.
C.addEventListener('dblclick', (e) => {
  if (e.target.closest('#toggle, .adui')) return;
  const id = hitTest(e.clientX, e.clientY);
  if (id !== -1) zoomToElement(id); else doReset();
});

window.addEventListener('keydown', (e) => {
  if (!e.key) return;
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key.toLowerCase() === 'r' && !e.metaKey && !e.ctrlKey && !e.altKey) doReset();
});

toggle.addEventListener('click', () => {
  const dark = document.body.classList.toggle('dark');
  ui.theme(dark ? 'dark' : 'light');
  readTheme();
});

// ───── Boot ─────
readTheme();
regen();
resize();
window.addEventListener('resize', resize);
// Re-wrap + re-fit once the content font is ready so line breaks measure against DM Sans.
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => { regen(); });
}
requestAnimationFrame(frame);
</script>
</body>
</html>
