<script>
const C = document.getElementById('c');
const X = C.getContext('2d', { alpha: false });
let W = 0, H = 0;
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const PI2 = Math.PI * 2;

// Offscreen buffers for real optical defocus. We render a shape's true silhouette,
// then blur it with a progressive downscale -> upscale (bilinear) ping-pong. That is a
// genuine blur (a square stays a soft square), GPU-accelerated via drawImage, and it
// deliberately avoids ctx.filter='blur()' (house rule / performance).
const OCSZ = 320, OCH = OCSZ / 2;
const _oc = document.createElement('canvas'); _oc.width = _oc.height = OCSZ;
const _ox = _oc.getContext('2d');
const _dc = document.createElement('canvas'); _dc.width = _dc.height = OCSZ;
const _dx = _dc.getContext('2d');
_ox.imageSmoothingEnabled = _dx.imageSmoothingEnabled = true;
_ox.imageSmoothingQuality = _dx.imageSmoothingQuality = 'high';

const HINTS = 'Scroll to rack focus · Drag an in-focus shape · [ ] depth of field · Click to lock focus · R reset';
const ui = PT.ui({ title: 'Focus', hints: HINTS, theme: 'light' });

// The bottom legend doubles as a stage-reflective status bar: idle shows the how-to,
// then racking / holding / moving / locking each swap in the live optical readout. We
// reuse the panel's own glass pill + segment classes so it always looks native.
const pill = document.querySelector('.adui-pill');
const seg = (html) => '<span class="adui-seg">' + html + '</span>';
const key = (t) => '<b class="adui-key">' + t + '</b>';
let lastBar = '';
function setBar(html) { if (pill && html !== lastBar) { pill.innerHTML = html; lastBar = html; } }
function idleBar() { lastBar = ''; ui.setHints(HINTS); }
let flashUntil = 0;                 // committed messages hold the bar until this timestamp
function flashBar(html, ms) { setBar(html); flashUntil = performance.now() + ms; }

// ───── Optics constants ─────
const DOF_MIN = 0.06, DOF_MAX = 0.55;   // depth-of-field width, in the z axis
const SELECT_SHARP = 0.5;               // a shape is interactive only above this sharpness
const N_SHAPES = 12;
const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

// ───── State (declared with defaults BEFORE the first resize() - no TDZ) ─────
let shapes = [];
let f = 0.5, fTarget = 0.5;             // focal plane, eased toward its target (filmic rack)
let dof = 0.2, dofTarget = 0.2;         // depth-of-field width, eased
let drag = null;                        // { id, offx, offy, moved } while a shape is held
let mode = null;                        // null | 'shape' | 'rail' | 'focus' | 'pinch'
let hoverId = 0, lockedId = 0;
let mouseX = -100, mouseY = -100;
let focusStartY = 0, focusStartF = 0;   // empty-drag rack (touch fallback for scroll)
let lastTap = 0;
let rackUntil = 0, dofUntil = 0;        // how long the racking / dof readout lingers
let inFocusCount = 0;
const activePointers = new Map();       // pointerId -> {x,y} for pinch tracking
let pinchStart = null;                  // { dist, dof }
const seed = 484848;

let docX = 0, docY = 0, docW = 0, docH = 0, minDim = 0;
let SPREAD = 0;                          // max bokeh circle-of-confusion growth, in px
let railX = 0, trackTop = 0, trackH = 0, railFrac = 0.9;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  C.width = W * dpr; C.height = H * dpr;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
  layout();
}
function layout() {
  const m = Math.max(20, Math.min(W, H) * 0.045);
  docX = m; docY = m;
  docW = W - 2 * m; docH = H - 2 * m;
  minDim = Math.min(docW, docH);
  SPREAD = minDim * 0.055;
  // Depth rail sits inside the right margin of the artboard.
  railX = docX + docW - Math.max(30, minDim * 0.05);
  trackTop = docY + docH * 0.13;
  trackH = docH * 0.74;
  railFrac = (railX - docX) / docW;
  // Positions live in normalized 0..1 artboard space, so they need no rescale; only
  // the pixel radius is recomputed from each shape's normalized size + depth scale.
  for (const s of shapes) s.r = s.nr * minDim * s.sizeScale;
}
resize();
window.addEventListener('resize', resize);

function mulberry32(s) {
  return function() {
    let t = (s += 0x6D2B79F5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const smoothstep = (a, b, x) => { const t = clamp((x - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); };
const byId = (id) => shapes.find(s => s.id === id);

// ───── Shapes read as one theme-aware grey; names label the readout ─────
// hexToRgb still parses the doc backdrop colour for the bokeh desaturation mix.
function hexToRgb(h) {
  const n = parseInt(h.slice(1), 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function parseRgb(s) {
  const m = s.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
  return m ? { r: +m[1], g: +m[2], b: +m[3] } : { r: 128, g: 128, b: 128 };
}
const TYPES = ['circle', 'square', 'triangle'];

// Name each shape by its geometry; a form that repeats gets a reading-order index.
function nameByForm() {
  const counts = {};
  for (const s of shapes) counts[s.type] = (counts[s.type] || 0) + 1;
  const seen = {};
  for (const s of shapes) {
    seen[s.type] = (seen[s.type] || 0) + 1;
    s.name = cap(s.type) + (counts[s.type] > 1 ? ' ' + seen[s.type] : '');
  }
}

function regen() {
  const rng = mulberry32(seed);
  shapes = [];
  for (let i = 0; i < N_SHAPES; i++) {
    // Stratified depth so the scene reads as a continuous stack; positions are free
    // (shapes overlap in screen space, which is the whole point - depth disambiguates).
    const z = clamp(0.06 + ((i + rng()) / N_SHAPES) * 0.88, 0.05, 0.95);
    const nx = 0.12 + rng() * 0.62;
    const ny = 0.14 + rng() * 0.7;
    const nr = 0.05 + rng() * 0.03;
    const sizeScale = 0.72 + z * 0.5;   // nearer planes render a touch larger
    shapes.push({
      id: i + 1, z, nx, ny, nr, sizeScale,
      r: nr * minDim * sizeScale,
      name: '',                         // filled by nameByForm() below
      type: TYPES[i % TYPES.length],
    });
  }
  nameByForm();
}
regen();

// Sharpness = how close a shape's depth sits to the focal plane, relative to the DoF.
// 1 inside the plane, easing to 0 as it falls off - the optical selection signal.
function sharpOf(s) { return 1 - smoothstep(dof * 0.35, dof, Math.abs(s.z - f)); }

// ───── Theme colours (cached; custom props don't transition, re-read only on toggle) ─────
let COL = {}, docRgb = { r: 237, g: 237, b: 239 }, OBJ_RGB = { r: 0, g: 0, b: 0 };
function readTheme() {
  const cs = getComputedStyle(document.body);
  COL = {
    bg:     cs.getPropertyValue('--bg').trim(),
    doc:    cs.getPropertyValue('--doc').trim(),
    fg:     cs.getPropertyValue('--fg').trim(),
    dim:    cs.getPropertyValue('--dim').trim(),
    mid:    cs.getPropertyValue('--mid').trim(),
    active: cs.getPropertyValue('--active').trim(),
    obj:    cs.getPropertyValue('--obj').trim(),
  };
  docRgb = hexToRgb(COL.bg);   // defocused shapes recede toward the real backdrop (no visible panel)
  // The real object grey (rgb), so defocused shapes desaturate toward the backdrop from
  // their true tone - not from white/black, which made them glow on a dark stage.
  OBJ_RGB = parseRgb(COL.obj);
}
readTheme();

// ───── Geometry helpers ─────
function toNorm(px, py) { return { nx: (px - docX) / docW, ny: (py - docY) / docH }; }
function railY(v) { return trackTop + (1 - v) * trackH; }
function fFromY(py) { return clamp(1 - (py - trackTop) / trackH, 0, 1); }
function onRail(px, py) {
  return Math.abs(px - railX) < Math.max(20, minDim * 0.05) &&
         py > trackTop - 16 && py < trackTop + trackH + 16;
}
function hitShape(px, py) {
  const p = toNorm(px, py);
  let best = null;
  for (const s of shapes) {
    if (sharpOf(s) < SELECT_SHARP) continue;        // focus IS selection: blurred = untouchable
    const dx = (p.nx - s.nx) * docW, dy = (p.ny - s.ny) * docH;
    if (Math.hypot(dx, dy) <= s.r * 1.15) { if (!best || s.z > best.z) best = s; }  // topmost (nearest) wins
  }
  return best;
}

// ───── Render ─────
function shapePath(type, x, y, r, ctx = X) {
  ctx.beginPath();
  if (type === 'square') {
    const h = r * 0.9;
    ctx.rect(x - h, y - h, h * 2, h * 2);
  } else if (type === 'triangle') {
    const tr = r * 1.1;
    for (let i = 0; i < 3; i++) {
      const a = -Math.PI / 2 + i * (PI2 / 3);
      const px = x + tr * Math.cos(a), py = y + tr * Math.sin(a);
      i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
    }
    ctx.closePath();
  } else {
    ctx.arc(x, y, r, 0, PI2);
  }
}

// Real lens defocus: render the shape's actual silhouette into an offscreen, then blur it
// by downscaling and upscaling with bilinear smoothing (two ping-pong passes -> a smooth,
// near-Gaussian falloff). The silhouette grows slightly with the circle of confusion and
// desaturates toward the backdrop, so out-of-focus shapes recede the way they do on a lens.
function drawShapeDefocused(s, cx, cy, blur) {
  const spread = blur * SPREAD;
  const r = s.r + spread * 0.28;                 // gentle circle-of-confusion growth (keeps shapes tighter)
  _ox.globalAlpha = 1;
  _ox.clearRect(0, 0, OCSZ, OCSZ);
  // Defocused shapes recede: their tone sinks toward the backdrop as blur grows, so the
  // sharp (selected) shape stays the clear figure and the rest read as quiet ground.
  _ox.fillStyle = mixRgb(OBJ_RGB, docRgb, clamp(0.34 + blur * 0.5, 0, 0.9));
  shapePath(s.type, OCH, OCH, r, _ox);
  _ox.fill();
  // Progressive mipmap blur: halve repeatedly (each 2x bilinear step averages smoothly),
  // then double back up. Stronger blur = more halvings; a floor keeps circles round.
  const MIND = 20;
  const steps = clamp(Math.round(blur * 5), 1, 5);
  let srcC = _oc, srcX = _ox, dstC = _dc, dstX = _dx, cur = OCSZ;
  for (let i = 0; i < steps; i++) {
    const half = cur >> 1;
    if (half < MIND) break;
    dstX.clearRect(0, 0, half, half);
    dstX.drawImage(srcC, 0, 0, cur, cur, 0, 0, half, half);   // downscale x0.5
    [srcC, dstC] = [dstC, srcC]; [srcX, dstX] = [dstX, srcX];
    cur = half;
  }
  while (cur < OCSZ) {                                        // upscale back x2 per step
    const up = Math.min(OCSZ, cur << 1);
    dstX.clearRect(0, 0, up, up);
    dstX.drawImage(srcC, 0, 0, cur, cur, 0, 0, up, up);
    [srcC, dstC] = [dstC, srcC]; [srcX, dstX] = [dstX, srcX];
    cur = up;
  }
  X.save();
  X.globalAlpha = clamp(0.9 - blur * 0.34, 0.4, 0.9);   // deeper defocus = quieter
  X.drawImage(srcC, cx - OCH, cy - OCH);
  X.restore();
}

function mixRgb(a, b, t) {
  const r = Math.round(a.r + (b.r - a.r) * t);
  const g = Math.round(a.g + (b.g - a.g) * t);
  const bl = Math.round(a.b + (b.b - a.b) * t);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

function drawShape(s) {
  const cx = docX + s.nx * docW, cy = docY + s.ny * docH;
  const baseR = s.r;
  const sharp = sharpOf(s);
  const blur = 1 - sharp;

  // Off-plane: the real silhouette, blurred into a soft optical defocus (no ctx.filter).
  if (blur > 0.03) {
    drawShapeDefocused(s, cx, cy, blur);
  }
  // In-plane: the crisp shape, fading up as it comes into focus.
  const isHeld = drag && mode === 'shape' && drag.id === s.id;
  if (sharp > 0.03) {
    X.save();
    X.globalAlpha = sharp;
    if (isHeld) {
      // the shape being dragged is the one charged thing - fill it with the accent
      X.fillStyle = '#FBF251';
      shapePath(s.type, cx, cy, baseR);
      X.fill();
    } else {
      X.fillStyle = COL.obj;
      shapePath(s.type, cx, cy, baseR);
      X.fill();
    }
    X.restore();
  }
  // Selection affordances only on shapes the focus has acquired.
  const interactive = sharp >= SELECT_SHARP;
  const held = drag && drag.id === s.id;
  if (interactive && (hoverId === s.id || held)) {
    X.save();
    X.strokeStyle = COL.fg;
    X.globalAlpha = 0.9;
    X.lineWidth = 1.5;
    X.beginPath(); X.arc(cx, cy, baseR + 8, 0, PI2); X.stroke();
    X.restore();
  }
  // Rack-to-subject: a ring rides the locked shape while the plane eases in.
  if (lockedId === s.id && Math.abs(fTarget - f) > 0.003) {
    X.save();
    X.strokeStyle = COL.fg;
    X.globalAlpha = 0.85;
    X.lineWidth = 1.5;
    X.setLineDash([4, 5]);
    X.beginPath(); X.arc(cx, cy, baseR + 12, 0, PI2); X.stroke();
    X.restore();
  }
}

function drawRail() {
  X.save();
  // DoF band - the depth interval currently in focus.
  const yTop = railY(clamp(f + dof / 2, 0, 1));
  const yBot = railY(clamp(f - dof / 2, 0, 1));
  X.fillStyle = COL.fg;
  X.globalAlpha = 0.12;
  X.fillRect(railX - 5, yTop, 10, yBot - yTop);
  X.globalAlpha = 1;
  // track
  X.strokeStyle = COL.dim;
  X.lineWidth = 1;
  X.beginPath(); X.moveTo(railX, trackTop); X.lineTo(railX, trackTop + trackH); X.stroke();
  // shape depth ticks, coloured, brightness = current sharpness
  for (const s of shapes) {
    const sharp = sharpOf(s);
    const y = railY(s.z);
    X.globalAlpha = 0.3 + sharp * 0.7;
    X.strokeStyle = sharp >= SELECT_SHARP ? COL.fg : COL.mid;
    X.lineWidth = sharp >= SELECT_SHARP ? 2 : 1;
    const w = 5 + sharp * 6;
    X.beginPath(); X.moveTo(railX - w, y); X.lineTo(railX - 1, y); X.stroke();
  }
  X.globalAlpha = 1;
  // focal-plane handle - a small triangle pointing at the plane
  const fy = railY(f);
  X.fillStyle = COL.fg;
  X.beginPath();
  X.moveTo(railX + 4, fy);
  X.lineTo(railX + 13, fy - 5);
  X.lineTo(railX + 13, fy + 5);
  X.closePath(); X.fill();
  X.strokeStyle = COL.fg;
  X.lineWidth = 1.5;
  X.beginPath(); X.moveTo(railX - 9, fy); X.lineTo(railX + 4, fy); X.stroke();
  // readouts
  X.font = '10px "IBM Plex Mono", monospace';
  X.textAlign = 'right';
  X.textBaseline = 'alphabetic';
  X.fillStyle = COL.active;
  X.fillText('Near', railX - 12, trackTop - 8);
  X.textBaseline = 'top';
  X.fillText('Far', railX - 12, trackTop + trackH + 8);
  X.textBaseline = 'middle';
  X.fillStyle = COL.fg;
  X.fillText('f ' + f.toFixed(2), railX - 12, fy);
  X.restore();
}

// ───── Frame ─────
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  // Ease the optics (filmic rack + smooth DoF breathing).
  const ke = Math.min(1, dt * 8);
  f += (fTarget - f) * ke;
  dof += (dofTarget - dof) * ke;

  // Sharp-count + hover pick (hover suppressed while dragging a shape).
  inFocusCount = 0;
  for (const s of shapes) if (sharpOf(s) >= SELECT_SHARP) inFocusCount++;
  if (mode !== 'shape' && mode !== 'pinch') {
    const h = hitShape(mouseX, mouseY);
    hoverId = h ? h.id : 0;
  }
  document.body.classList.toggle('over', !!hoverId && !drag);

  // Status bar: committed flash holds, else the live optical state, else idle.
  if (now >= flashUntil) {
    if (mode === 'shape' && drag) {
      const s = byId(drag.id);
      if (s) setBar(drag.moved
        ? seg(key('Moving') + ' ' + s.name) + seg('z ' + s.z.toFixed(2))
        : seg(key(cap(s.name)) + ' held') + seg('Release to lock focus'));
    } else if (mode === 'pinch' || now < dofUntil) {
      const band = dof < 0.16 ? 'Shallow' : dof > 0.4 ? 'Deep' : 'Medium';
      setBar(seg(key('Depth of field') + ' ' + dof.toFixed(2)) + seg(band) + seg(inFocusCount + ' in focus'));
    } else if (mode === 'rail' || mode === 'focus' || now < rackUntil) {
      setBar(seg(key('Focus') + ' ' + f.toFixed(2)) + seg('Depth of field ' + dof.toFixed(2)) + seg(inFocusCount + ' in focus'));
    } else if (hoverId) {
      const s = byId(hoverId);
      if (s) setBar(seg(key(cap(s.name)) + ' in focus') + seg('z ' + s.z.toFixed(2)) + seg(key('Click') + ' to lock'));
    } else if (lastBar !== '') {
      idleBar();
    }
  }

  // Draw: repaint the full backdrop, then the scene far-to-near (painter's order).
  X.fillStyle = COL.bg;
  X.fillRect(0, 0, W, H);
  // Work zone: docX/docY/docW/docH stays as an invisible limit zone (no visible panel).

  const order = shapes.slice().sort((a, b) => a.z - b.z);
  for (const s of order) drawShape(s);
  drawRail();

  requestAnimationFrame(frame);
}

// ───── Input ─────
const cursor = document.getElementById('cursor');
const toggle = document.getElementById('toggle');

function markRack() { rackUntil = performance.now() + 900; }
function markDof()  { dofUntil  = performance.now() + 900; }

// Wheel racks the focal plane (the primary desktop gesture).
window.addEventListener('wheel', (e) => {
  if (e.target.closest('#toggle, .adui')) return;
  e.preventDefault();
  fTarget = clamp(fTarget - e.deltaY * 0.0009, 0, 1);
  lockedId = 0;
  flashUntil = 0;
  markRack();
}, { passive: false });

function updatePinch() {
  if (activePointers.size < 2) return;
  const pts = [...activePointers.values()];
  const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
  if (!pinchStart) { pinchStart = { dist, dof: dofTarget }; return; }
  if (pinchStart.dist > 0) {
    // Spread fingers = widen the depth of field (deeper focus); pinch = shallower.
    dofTarget = clamp(pinchStart.dof * (dist / pinchStart.dist), DOF_MIN, DOF_MAX);
    markDof();
  }
}

window.addEventListener('pointermove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top  = mouseY + 'px';
  if (activePointers.has(e.pointerId)) activePointers.set(e.pointerId, { x: mouseX, y: mouseY });

  if (activePointers.size >= 2) { mode = 'pinch'; drag = null; updatePinch(); return; }

  if (mode === 'shape' && drag) {
    const s = byId(drag.id);
    if (!s) return;
    const p = toNorm(mouseX, mouseY);
    const nx = clamp(p.nx - drag.offx, s.r / docW, railFrac - s.r / docW);
    const ny = clamp(p.ny - drag.offy, s.r / docH, 1 - s.r / docH);
    if (Math.hypot((nx - s.nx) * docW, (ny - s.ny) * docH) > minDim * 0.012) drag.moved = true;
    s.nx = nx; s.ny = ny;
  } else if (mode === 'rail') {
    fTarget = fFromY(mouseY);
    lockedId = 0;
    markRack();
  } else if (mode === 'focus') {
    // Empty-area vertical drag racks focus - the touch fallback for the scroll wheel.
    fTarget = clamp(focusStartF - (mouseY - focusStartY) / (docH * 0.85), 0, 1);
    lockedId = 0;
    markRack();
  }
});

window.addEventListener('pointerdown', (e) => {
  if (e.target.closest('#toggle, .adui')) return;
  if (e.button !== undefined && e.button !== 0) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top  = mouseY + 'px';

  if (activePointers.size >= 2) {   // second finger down: pinch the DoF, abort any drag
    mode = 'pinch'; drag = null; pinchStart = null;
    document.body.classList.remove('dragging');
    updatePinch();
    return;
  }

  try { C.setPointerCapture(e.pointerId); } catch (_) {}
  flashUntil = 0;

  if (onRail(mouseX, mouseY)) {
    mode = 'rail';
    fTarget = fFromY(mouseY);
    lockedId = 0;
    markRack();
    return;
  }
  const h = hitShape(mouseX, mouseY);
  if (h) {
    const p = toNorm(mouseX, mouseY);
    mode = 'shape';
    drag = { id: h.id, offx: p.nx - h.nx, offy: p.ny - h.ny, moved: false };
    hoverId = h.id;
    document.body.classList.add('dragging');
    return;
  }
  // Empty artboard: begin a focus-rack drag, and arm the double-tap reset (touch R).
  mode = 'focus';
  focusStartY = mouseY; focusStartF = fTarget;
});

function endPointer(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size < 2) { pinchStart = null; if (mode === 'pinch') mode = null; }
}

window.addEventListener('pointerup', (e) => {
  const wasMode = mode, wasDrag = drag;
  endPointer(e);
  if (activePointers.size >= 1) return;   // still mid multi-touch

  if (wasMode === 'shape' && wasDrag) {
    const s = byId(wasDrag.id);
    if (s && !wasDrag.moved) {
      // A click (no drag) racks the plane to exactly this subject's depth.
      fTarget = s.z; lockedId = s.id;
      flashBar(seg(key('Focus locked') + ' ' + s.name) + seg('z ' + s.z.toFixed(2)), 1500);
    }
    drag = null;
    document.body.classList.remove('dragging');
  } else if (wasMode === 'focus') {
    // No drag movement => it was a tap: double-tap empty resets (touch fallback for R).
    if (Math.abs(fTarget - focusStartF) < 0.004) {
      const t = performance.now();
      if (t - lastTap < 320) { doReset(); lastTap = 0; } else lastTap = t;
    }
  }
  mode = null;
});

window.addEventListener('pointercancel', (e) => {
  endPointer(e);
  if (activePointers.size >= 1) return;
  drag = null; mode = null; pinchStart = null;
  document.body.classList.remove('dragging');
});

function doReset() {
  drag = null; mode = null; pinchStart = null;
  activePointers.clear();
  lockedId = 0; hoverId = 0; flashUntil = 0;
  fTarget = 0.5; dofTarget = 0.2;
  document.body.classList.remove('dragging', 'over');
  regen();
  idleBar();
}

window.addEventListener('keydown', (e) => {
  if (!e.key) return;
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const k = e.key.toLowerCase();
  if (k === 'r' && !e.metaKey && !e.ctrlKey && !e.altKey) { doReset(); }
  else if (e.key === '[') { dofTarget = clamp(dofTarget - 0.03, DOF_MIN, DOF_MAX); markDof(); }
  else if (e.key === ']') { dofTarget = clamp(dofTarget + 0.03, DOF_MIN, DOF_MAX); markDof(); }
});

toggle.addEventListener('click', () => {
  const dark = document.body.classList.toggle('dark');
  ui.theme(dark ? 'dark' : 'light');
  readTheme();
});

requestAnimationFrame(frame);
</script>
</body>
</html>
